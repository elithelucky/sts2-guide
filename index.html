<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>STS2 컴패니언</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable','Noto Sans KR',-apple-system,sans-serif;background:#0f1117;color:#e8e6e3;font-size:14px;max-width:480px;margin:0 auto;min-height:100vh;-webkit-tap-highlight-color:transparent}
.hdr{background:linear-gradient(135deg,#1a1c24,#2d1f1f);padding:14px 16px 10px;border-bottom:1px solid #2a2c34}
.hdr h1{font-size:17px;font-weight:800;color:#fff;margin:0}
.hdr p{font-size:11px;color:#8a8d98;margin:0}
.tabs{display:flex;background:#1a1c24;border-bottom:1px solid #2a2c34;position:sticky;top:0;z-index:10}
.tabs button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0;background:none;border:none;color:#5a5d68;font-size:10px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.tabs button.on{color:#e74c3c;border-bottom-color:#e74c3c}
.ct{padding:12px 14px 80px}
.bx{background:#1a1c24;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #2a2c34}
input[type=text]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #3a3d48;background:#12131a;color:#e8e6e3;font-size:13px;outline:none;font-family:inherit;box-sizing:border-box}
.bt{padding:8px 14px;border-radius:8px;border:1px solid #2a2c34;background:#12131a;color:#8a8d98;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.bt.p{background:#27ae60;border-color:#27ae60;color:#fff}
.bt.d{background:none;border-color:#e74c3c33;color:#e74c3c}
.bt.f{width:100%;padding:10px 0;font-size:12px}
.bg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;display:inline-block}
.tb{font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;display:inline-block}
.dd{position:absolute;top:100%;left:0;right:0;background:#1e2028;border:1px solid #3a3d48;border-radius:8px;margin-top:4px;z-index:20;max-height:300px;overflow-y:auto}
.di{display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;border-bottom:1px solid #2a2c34}
.di:hover{background:#2a2c34}
.fb2{padding:5px 12px;border-radius:20px;border:1px solid #2a2c34;background:#12131a;color:#8a8d98;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;margin:0 3px 6px 0}
.fb2.on{color:var(--fc);border-color:var(--fc);background:color-mix(in srgb,var(--fc) 15%,transparent)}
.rc{border-radius:10px;padding:12px;margin-bottom:8px;background:#12131a}
.rc.top{background:#1a2a1a;border:1px solid #2d4a2d}
.di-img{width:44px;height:62px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#12131a;border:1px solid #3a3d48}
.di-img img{width:100%;height:100%;object-fit:cover}
.di-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}

/* 카드 플립 */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px}
.card-grid.g2{grid-template-columns:repeat(2,1fr)}
.card-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.card-item .cname{font-size:14px;font-weight:700;color:#e8e6e3;text-align:center;line-height:1.2}
.flip-wrap{perspective:600px;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent}
.flip-inner{position:relative;width:100%;padding-top:140%;transform-style:preserve-3d;transition:transform .4s ease}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:10px;overflow:hidden}
.flip-front{background:#12131a;border:2px solid var(--rc)}
.flip-front img{width:100%;height:100%;object-fit:cover;display:block}
.flip-front .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--rc)}
.flip-front .cost-badge{position:absolute;top:4px;right:4px;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;background:var(--ec);text-shadow:0 1px 2px rgba(0,0,0,.8)}
.flip-back{background:#1a1c24;border:2px solid var(--rc);transform:rotateY(180deg);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:8px;gap:4px;text-align:center}
.flip-back .b-tier{font-size:22px;font-weight:900;color:var(--tc)}
.flip-back .b-name{font-size:11px;font-weight:800;color:#e8e6e3;line-height:1.2}
.flip-back .b-desc{font-size:10px;color:#b0b3be;line-height:1.4}
.flip-back .b-tip{font-size:9px;color:#f1c40f;font-style:italic;line-height:1.3}

/* 완성덱 아코디언 */
.arch-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px;cursor:pointer;border-radius:10px;background:#12131a;border:1px solid #2a2c34;margin-bottom:6px}
.arch-hdr.open{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:none;margin-bottom:0}
.arch-body{background:#12131a;border:1px solid #2a2c34;border-top:none;border-radius:0 0 10px 10px;padding:12px;margin-bottom:6px;display:none}
.arch-body.open{display:block}

/* 실시간 분석 */
.analysis-card{background:#12131a;border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid var(--ac)}
.prog-bar{height:6px;border-radius:3px;background:#2a2c34;margin-top:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:24px">⚔️</span>
      <div><h1>STS2 컴패니언</h1><p>Ironclad · <span id="nc"></span>장</p></div>
    </div>
    <div id="hb"></div>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="ct" id="mn"></div>

  {name:"공격 성장",cards:["aggression","rampage"],desc:"매 턴 강화→광란 폭딜",cat:"범용"},
  {name:"방어→딜",cards:["unmovable","body_slam"],desc:"방어 2배→딜 전환",cat:"방밀"},
  {name:"방어 반사",cards:["juggernaut","shrug_it_off"],desc:"방어 획득시 자동 5뎀",cat:"방밀"},
  {name:"에너지 폭발",cards:["offering","bloodletting"],desc:"에너지+드로우 대량 확보",cat:"범용"}
];

const TS={S:95,A:80,B:65,C:45,D:25};
const TC={S:"#e74c3c",A:"#e67e22",B:"#f1c40f",C:"#3498db",D:"#95a5a6"};
const RC={"시작":"#9e9e9e","일반":"#8a8d98","고급":"#3d7dd4","희귀":"#daa520","특수":"#9b59b6"};
const EC={"시작":"#555","일반":"#666","고급":"#2563a8","희귀":"#b8860b","특수":"#7d3c98"};
const CC={자해:"#e74c3c",소멸:"#8e44ad",취약:"#2ecc71",타격:"#e67e22",방밀:"#3498db",범용:"#95a5a6"};

let S={tab:"live",act:1,deck:[],rw:[],q:"",sdk:false,cf:"전체",pick:false};
let flipped={};
let openArch=null;

function cardFlip(id,ev){
  if(ev)ev.stopPropagation();
  flipped[id]=!flipped[id];
  const el=document.getElementById("fw_"+id);
  if(el)el.classList.toggle("flipped",!!flipped[id]);
}

function flipCard(card){
  const rc=RC[card.r]||"#555";
  const ec=EC[card.r]||"#555";
  const tc=TC[card.tier]||"#888";
  const src=I[card.id];
  const isFlipped=!!flipped[card.id];
  return`<div class="flip-wrap${isFlipped?" flipped":""}" id="fw_${card.id}" onclick="cardFlip('${card.id}',event)" style="--rc:${rc};--ec:${ec};--tc:${tc}">
    <div class="flip-inner">
      <div class="flip-front">
        ${src?`<img src="${src}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="no-img">${card.n.slice(0,2)}</div>`:`<div class="no-img">${card.n.slice(0,2)}</div>`}
        <div class="cost-badge">${card.c}</div>
      </div>
      <div class="flip-back">
        <div class="b-tier">${card.tier}</div>
        <div class="b-name">${card.n}</div>
        <div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap">
          <span class="tb" style="background:${card.t==="공격"?"#e74c3c":card.t==="파워"?"#8e44ad":"#3498db"}22;color:${card.t==="공격"?"#e74c3c":card.t==="파워"?"#8e44ad":"#3498db"}">${card.t}</span>
          <span class="tb" style="background:${rc}22;color:${rc}">${card.r}</span>
        </div>
        <div class="b-desc">${card.d}</div>
        <div class="b-tip">💡${card.tip.length>30?card.tip.slice(0,30)+"…":card.tip}</div>
      </div>
    </div>
  </div>`;
}

function cardItem(card){
  return`<div class="card-item">${flipCard(card)}<div class="cname">${card.n}</div></div>`;
}

function miniThumb(card){
  const rc=RC[card.r]||"#555";
  const src=I[card.id];
  return`<div class="di-img" style="border-color:${rc}">${src?`<img src="${src}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="di-fb" style="background:${rc}33;color:${rc}">${card.n.slice(0,1)}</div>`:`<div class="di-fb" style="background:${rc}33;color:${rc}">${card.n.slice(0,1)}</div>`}</div>`;
}

function sc(cid){
  const card=C.find(c=>c.id===cid);if(!card)return{s:50,r:"?"};
  let s=TS[card.tier]||50,rs=[card.tier+"티어"];
  const a=S.act,d=S.deck;
  if(a===1&&card.t==="공격"&&d.filter(c=>C.find(x=>x.id===c)?.t==="공격").length<3){s+=12;rs.push("Act1:딜필요")}
  if(a===2&&(card.d||"").includes("전체")){s+=10;rs.push("Act2:AoE")}
  if(a===3&&d.length>14){s-=8;rs.push("Act3:압축")}
  const combos=COMBOS.filter(cb=>cb.cards.includes(cid)&&cb.cards.some(c2=>c2!==cid&&d.includes(c2)));
  if(combos.length>0){s+=15;rs.push("🔗"+combos.map(cb=>cb.name).join(","))}
  const deckArchs=ARCHS.filter(ar=>ar.must.some(m=>d.includes(m))||ar.rec.filter(r=>d.includes(r)).length>=2);
  const matchArchs=ARCHS.filter(ar=>(ar.must.includes(cid)||ar.rec.includes(cid))&&deckArchs.includes(ar));
  if(matchArchs.length>0){s+=10;rs.push("🎯"+matchArchs.map(a=>a.name).join(","))}
  if(d.includes(cid)){s-=10;rs.push("이미보유")}
  return{s:Math.min(100,Math.max(0,s)),r:rs.join(" · ")};
}

// 실시간 덱 분석
function analyzeDeck(){
  const d=S.deck;
  if(!d.length)return null;

  // 아키타입 점수
  const archScores=ARCHS.map(ar=>{
    const mustHave=ar.must.filter(m=>d.includes(m)).length;
    const recHave=ar.rec.filter(r=>d.includes(r)).length;
    const score=mustHave*30+recHave*8;
    return{...ar,mustHave,recHave,score};
  }).sort((a,b)=>b.score-a.score);

  const top=archScores[0];
  const second=archScores[1];

  // 콤보 현황
  const activeC=COMBOS.filter(cb=>cb.cards.every(c=>d.includes(c)));
  const nearC=COMBOS.filter(cb=>!cb.cards.every(c=>d.includes(c))&&cb.cards.some(c=>d.includes(c)));

  // 덱 균형
  const atkCnt=d.filter(c=>C.find(x=>x.id===c)?.t==="공격").length;
  const sklCnt=d.filter(c=>C.find(x=>x.id===c)?.t==="스킬").length;
  const pwrCnt=d.filter(c=>C.find(x=>x.id===c)?.t==="파워").length;

  // 다음에 노려야 할 카드 (top arch 기준)
  const wantCards=[];
  if(top.score>0){
    top.must.filter(m=>!d.includes(m)).forEach(m=>{const c=C.find(x=>x.id===m);if(c)wantCards.push({...c,reason:"필수카드",priority:"high"})});
    top.rec.filter(r=>!d.includes(r)).slice(0,4).forEach(r=>{const c=C.find(x=>x.id===r);if(c)wantCards.push({...c,reason:"추천카드",priority:"med"})});
  }
  // 콤보 완성용
  nearC.forEach(cb=>{
    cb.cards.filter(cid=>!d.includes(cid)).slice(0,1).forEach(cid=>{
      const c=C.find(x=>x.id===cid);
      if(c&&!wantCards.find(w=>w.id===cid))wantCards.push({...c,reason:"콤보완성: "+cb.name,priority:"high"});
    });
  });

  return{archScores,top,second,activeC,nearC,atkCnt,sklCnt,pwrCnt,wantCards:wantCards.slice(0,5),total:d.length};
}

function render(){
  document.getElementById("nc").textContent=C.length;
  const tabs=[{id:"live",i:"⚡",l:"실시간"},{id:"combo",i:"🔗",l:"콤보"},{id:"ref",i:"📋",l:"카드"}];
  document.getElementById("tabs").innerHTML=tabs.map(t=>`<button class="${S.tab===t.id?"on":""}" onclick="S.tab='${t.id}';render()"><span style="font-size:16px">${t.i}</span><span>${t.l}</span></button>`).join("");
  document.getElementById("hb").innerHTML=S.tab==="live"?`<span class="bg" style="background:#e74c3c22;color:#e74c3c">Act ${S.act}</span> <span class="bg" style="background:#e74c3c22;color:#e74c3c">${S.deck.length}장</span>`:"";
  document.getElementById("mn").innerHTML=S.tab==="live"?rL():S.tab==="combo"?rCo():rR();
}

function updateDD(){
  const dd=document.getElementById("sdd"),inp=document.getElementById("si");
  if(!dd||!inp)return;
  S.q=inp.value;
  const q=inp.value.toLowerCase().trim();
  if(!q){dd.innerHTML="";dd.style.display="none";return;}
  const fc=C.filter(c=>c.n.includes(q)||c.d.includes(q)).slice(0,6);
  if(!fc.length){dd.innerHTML="";dd.style.display="none";return;}
  dd.style.display="block";
  dd.innerHTML=fc.map(c=>`<div class="di" onclick="addR('${c.id}')">${miniThumb(c)}<div style="flex:1"><div style="font-size:14px;font-weight:700">${c.n} <span class="tb" style="color:${TC[c.tier]};background:${TC[c.tier]}22">${c.tier}</span></div><div style="font-size:10px;color:#7a7d88">${c.d}</div></div></div>`).join("");
}

function toggleArch(idx){
  openArch=openArch===idx?null:idx;
  render();
}

function rL(){
  let h=`<div class="bx">
    <div style="display:flex;gap:4px;margin-bottom:8px">${[1,2,3].map(a=>`<button onclick="S.act=${a};render()" style="flex:1;padding:7px 0;border-radius:8px;border:1px solid ${S.act===a?"#e74c3c":"#2a2c34"};background:${S.act===a?"#e74c3c":"#12131a"};color:${S.act===a?"#fff":"#8a8d98"};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Act ${a}</button>`).join("")}</div>
    <div style="display:flex;gap:8px">
      <button class="bt" style="flex:1" onclick="S.sdk=!S.sdk;render()">${S.sdk?"▲":"▼"} 내 덱 (${S.deck.length}장)</button>
      <button class="bt d" onclick="S.deck=[];S.rw=[];S.act=1;S.pick=false;flipped={};render()">🔄 새런</button>
    </div>
  </div>`;

  if(S.sdk){
    h+=`<div class="bx" style="max-height:160px;overflow-y:auto">${S.deck.length===0?"<p style='text-align:center;color:#5a5d68;font-size:12px;padding:8px'>비어있음</p>":"<div style='display:flex;flex-wrap:wrap;gap:4px'>"+S.deck.map((cid,i)=>{const card=C.find(c=>c.id===cid);return card?`<span onclick="S.deck.splice(${i},1);render()" style="display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:#12131a;border:1px solid #2a2c34;border-radius:6px;font-size:11px;cursor:pointer">${card.n} <span style='color:#e74c3c88'>✕</span></span>`:""}).join("")+"</div>"}</div>`;
  }

  // 실시간 덱 분석
  if(S.deck.length>0){
    const analysis=analyzeDeck();
    if(analysis){
      const top=analysis.top;
      h+=`<div class="bx" style="border:1px solid ${top.color}44;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:14px;font-weight:800">🔍 현재 덱 분석</span>
          <span style="font-size:11px;color:#8a8d98">${analysis.total}장</span>
        </div>`;

      // 아키타입 매칭도
      h+=`<div style="margin-bottom:12px">`;
      analysis.archScores.filter(a=>a.score>0).slice(0,3).forEach((ar,i)=>{
        const pct=Math.min(100,ar.score);
        h+=`<div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:12px;font-weight:700;color:${ar.color}">${ar.emoji} ${ar.name}</span>
            <span style="font-size:11px;color:${ar.color}">필수 ${ar.mustHave}/${ar.must.length} · 추천 ${ar.recHave}</span>
          </div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${ar.color}"></div></div>
        </div>`;
      });
      if(analysis.archScores.every(a=>a.score===0)){
        h+=`<p style="font-size:12px;color:#8a8d98">아직 방향이 없어요. 카드를 더 추가하면 분석이 시작돼요!</p>`;
      }
      h+=`</div>`;

      // 방향 제안
      if(top.score>0){
        h+=`<div style="background:${top.color}11;border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid ${top.color}33">
          <div style="font-size:13px;font-weight:800;color:${top.color};margin-bottom:4px">${top.emoji} ${top.name} 방향으로 가세요</div>
          <div style="font-size:11px;color:#b0b3be;line-height:1.6">${top.desc}</div>
          <div style="font-size:11px;color:#8a8d98;margin-top:4px">권장 덱 크기: ${top.idealSize}</div>
        </div>`;
      }

      // 활성 콤보
      if(analysis.activeC.length>0){
        h+=`<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:#27ae60;margin-bottom:4px">✅ 완성된 콤보 (${analysis.activeC.length}개)</div>
          ${analysis.activeC.map(cb=>`<span class="bg" style="background:${CC[cb.cat]||"#555"}22;color:${CC[cb.cat]||"#555"};margin:2px">${cb.name}</span>`).join("")}
        </div>`;
      }

      // 다음에 노려야 할 카드
      if(analysis.wantCards.length>0){
        h+=`<div style="margin-bottom:6px"><div style="font-size:12px;font-weight:700;color:#f1c40f;margin-bottom:6px">⭐ 지금 당장 노려야 할 카드</div>
          ${analysis.wantCards.map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #2a2c3488">
            ${miniThumb(c)}
            <div style="flex:1">
              <span style="font-size:13px;font-weight:700">${c.n}</span>
              <span class="tb" style="color:${TC[c.tier]};background:${TC[c.tier]}22;margin-left:4px">${c.tier}</span>
              <span style="display:block;font-size:10px;color:${c.priority==="high"?"#f1c40f":"#8a8d98"};margin-top:1px">${c.reason}</span>
            </div>
          </div>`).join("")}
        </div>`;
      }

      // 덱 밸런스
      h+=`<div style="font-size:11px;color:#5a5d68;margin-top:8px;display:flex;gap:12px">
        <span>⚔️ 공격 ${analysis.atkCnt}장</span>
        <span>🛡️ 스킬 ${analysis.sklCnt}장</span>
        <span>✨ 파워 ${analysis.pwrCnt}장</span>
      </div>`;

      h+=`</div>`;
    }
  }

  h+=`<div class="bx"><h3 style="margin:0 0 10px;font-size:14px;font-weight:700">🎴 카드 보상 (${S.rw.length}/3)</h3>`;

    h+=`<div style="position:relative;margin-bottom:8px"><input type="text" id="si" value="${S.q}" placeholder="카드 이름 검색..." oninput="updateDD()"><div class="dd" id="sdd" style="display:none"></div></div>`;

    if(S.pick){
      h+=`<div class="card-grid">${C.map(card=>cardItem(card)).join("")}</div>
      <p style="text-align:center;font-size:11px;color:#5a5d68;margin-top:8px">탭=정보확인 · 추가는 아래 버튼</p>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">${C.map(c=>`<button class="bt" onclick="addR('${c.id}')" style="font-size:11px;padding:3px 8px">${c.n}</button>`).join("")}</div>`;
    }
  }

  if(S.rw.length>0){
    h+=`<div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
      ${S.rw.map(c=>`<div style="flex:1;max-width:120px">
        ${flipCard(c)}
        <div style="font-size:14px;font-weight:700;text-align:center;margin-top:4px">${c.n}</div>
        <button onclick="rmR('${c.id}')" style="background:none;border:none;color:#e74c3c;font-size:11px;cursor:pointer;display:block;margin:2px auto">✕ 제거</button>
      </div>`).join("")}
    </div>`;
  }
  h+=`</div>`;

  if(S.rw.length>0){
    const sr=S.rw.map(c=>({...c,...sc(c.id)})).sort((a,b)=>b.s-a.s);
    h+=`<div class="bx"><h3 style="margin:0 0 10px;font-size:14px;font-weight:700">🤖 AI 추천</h3>`;
    sr.forEach((c,i)=>{
      const top=i===0,scl=c.s>=80?"#27ae60":c.s>=60?"#f39c12":"#e74c3c";
      h+=`<div class="rc${top?" top":""}" style="border-left:4px solid ${scl}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:15px;font-weight:700">${c.n} <span class="tb" style="color:${TC[c.tier]};background:${TC[c.tier]}22">${c.tier}</span></span>
          <span style="font-size:13px;font-weight:800;padding:3px 10px;border-radius:8px;background:${scl}22;color:${scl}">${c.s}점</span>
        </div>
        <div style="font-size:11px;color:#8a8d98">${c.d}</div>
        <div style="font-size:10px;color:#f1c40f;margin-top:2px;font-style:italic">💡 ${c.tip}</div>
        <div style="font-size:10px;color:#b0b3be;margin-top:2px">${c.r}</div>
        ${top?"<div style='font-size:11px;font-weight:700;color:#27ae60;margin-top:4px'>⭐ 추천</div>":""}
        <button class="bt f${top?" p":""}" style="margin-top:8px" onclick="pick('${c.id}')">선택</button>
      </div>`;

    h+=`<button class="bt f" onclick="skip()" style="margin-top:4px">⏭️ 스킵</button></div>`;
  }

  if(!S.rw.length&&!S.deck.length){
    h+=`<div style="text-align:center;padding:40px 20px">
      <span style="font-size:48px;display:block;margin-bottom:16px">🃏</span>
      <p style="font-size:16px;font-weight:700;margin-bottom:8px">런을 시작하세요!</p>
      <p style="font-size:12px;color:#8a8d98;line-height:1.7">카드를 추가하면 실시간으로<br>덱 방향과 다음 픽 추천을 알려드려요</p>
    </div>`;
  }
  return h;
}

        <div style="font-size:12px;font-weight:700;color:#3498db;margin-bottom:6px">🔵 추천 카드</div>
        <div class="card-grid" style="margin-bottom:12px">
          ${ar.rec.map(id=>{const card=C.find(c=>c.id===id);if(!card)return"";const owned=S.deck.includes(id);return`<div style="position:relative">${cardItem(card)}${owned?'<div style="position:absolute;top:4px;left:4px;background:#27ae60;border-radius:10px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff">✓</div>':''}</div>`;}).join("")}
        </div>
        <div style="background:#0f1117;border-radius:8px;padding:10px;margin-bottom:10px">
          <div style="font-size:12px;font-weight:700;color:#f1c40f;margin-bottom:6px">🏺 추천 유물</div>
          ${ar.relics.map(r=>`<div style="font-size:11px;color:#b0b3be;padding:2px 0">· ${r}</div>`).join("")}
        </div>
        <div style="background:#0f1117;border-radius:8px;padding:10px;margin-bottom:6px">
          <div style="font-size:12px;font-weight:700;color:#8a8d98;margin-bottom:6px">💡 핵심 팁</div>
          ${ar.tips.map(t=>`<div style="font-size:11px;color:#b0b3be;padding:2px 0">· ${t}</div>`).join("")}
        </div>
        <div style="display:flex;gap:8px;font-size:11px">
          <span style="color:#27ae60">✅ ${ar.pro}</span>
          <span style="color:#e74c3c">⚠️ ${ar.con}</span>
        </div>
      </div>`;
    }
  });

  h+=`<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#f1c40f">🔗 미니 콤보 (${COMBOS.length}개)</h3>`;
  h+=`<div style="margin-bottom:12px">${["전체","자해","소멸","취약","타격","방밀","범용"].map(cat=>`<button class="fb2${S.cf===cat?" on":""}" style="--fc:${CC[cat]||"#e74c3c"}" onclick="S.cf='${cat}';render()">${cat}</button>`).join("")}</div>`;

  COMBOS.filter(cb=>S.cf==="전체"||cb.cat===S.cf).forEach(cb=>{
    const done=cb.cards.every(c=>S.deck.includes(c));
    const partial=!done&&cb.cards.some(c=>S.deck.includes(c));
    h+=`<div class="bx" style="border-left:4px solid ${CC[cb.cat]||"#555"};margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:14px;font-weight:700">${done?"✅":partial?"🔸":"⬜"} ${cb.name}</span>
        <span class="bg" style="background:${CC[cb.cat]||"#555"}22;color:${CC[cb.cat]||"#555"}">${cb.cat}</span>
      </div>
      <div class="card-grid">
        ${cb.cards.map(cid=>{const card=C.find(c=>c.id===cid);if(!card)return"";return cardItem(card);}).join("")}
      </div>
      <div style="font-size:12px;color:#b0b3be;margin-top:8px">${cb.desc}</div>
      ${!done?`<div style="font-size:11px;color:#f1c40f;margin-top:4px">💡 ${cb.cards.filter(c=>!S.deck.includes(c)).map(c=>C.find(x=>x.id===c)?.n).join(", ")} 추가하면 완성</div>`:""}
    </div>`;
  });
  return h;
}

function rR(){
  let h=`<div class="bx" style="margin-bottom:12px"><p style="font-size:12px;color:#9a9da8">카드 탭 → 뒤집어서 상세정보 확인</p></div>`;
  ["시작","일반","고급","희귀","특수"].forEach(rarity=>{
    const cards=C.filter(c=>c.r===rarity);
    if(!cards.length)return;
    h+=`<h3 style="font-size:14px;font-weight:700;margin:12px 0 8px;color:${RC[rarity]||"#888"}">${rarity} (${cards.length}장)</h3>`;
    h+=`<div class="card-grid">${cards.map(card=>cardItem(card)).join("")}</div>`;
  });
  return h;
}

function addR(id){if(S.rw.length>=3||S.rw.find(r=>r.id===id))return;const c=C.find(x=>x.id===id);if(c){S.rw.push(c);S.q="";S.pick=false;}render();}
function rmR(id){S.rw=S.rw.filter(r=>r.id!==id);render();}
function pick(id){S.deck.push(id);S.rw=[];render();}
function skip(){S.rw=[];render();}

render();
</script>
</body>
</html>
