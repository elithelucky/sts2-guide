<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>카드 뭐 뽑지?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0d12;--s1:#151720;--s2:#0f1017;--bd:#1e2030;--bd2:#2a2d3e;--tx:#f5f5f7;--sub:#a1a1a6;--dim:#86868b;--dk:#636366}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:15px;max-width:440px;margin:0 auto;padding:20px 16px 60px;min-height:100vh;-webkit-font-smoothing:antialiased}
body.modal-lock{position:fixed;left:0;right:0;overflow:hidden;width:100%;touch-action:none}
.hdr{display:none}
.hdr h1{font-size:28px;font-weight:900;letter-spacing:-.02em;margin-bottom:4px}
.hdr p{font-size:14px;color:var(--dim);font-weight:500}
.card{background:var(--s1);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--bd)}
.card-label{font-size:18px;font-weight:500;color:#b7c0da;margin-bottom:12px;letter-spacing:-.01em}
/* 캐릭터 선택 */
.char-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;padding-right:20px;scrollbar-width:none;margin-bottom:12px;touch-action:pan-x;cursor:grab}
.char-row::-webkit-scrollbar{display:none}
.char-row.dragging{cursor:grabbing}
.char-btn{flex-shrink:0;padding:9px 16px;border-radius:20px;border:1.5px solid color-mix(in srgb,var(--cc) 42%, #000);background:color-mix(in srgb,var(--cc) 20%, #000 80%);color:var(--cc);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.char-btn.on{color:#fff;border-color:color-mix(in srgb,var(--cc) 75%, #000);background:color-mix(in srgb,var(--cc) 38%, #000 62%);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--cc) 22%, transparent)}
.char-btn img{width:18px;height:18px;object-fit:contain;margin-right:6px;vertical-align:-4px}
.char-btn span{vertical-align:middle}
/* 빌드 */
.builds{display:flex;gap:8px;flex-wrap:wrap}
.mode-tabs{display:flex;gap:0;margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid var(--bd2);background:var(--bg)}
.mode-tab{flex:1;padding:11px;background:none;border:none;color:var(--dk);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.mode-tab.on{background:var(--bd2);color:var(--tx);font-weight:700}

.app-tabs{display:flex;gap:0;margin:12px 0 14px;border-radius:14px;overflow:hidden;border:1px solid var(--bd2);background:var(--s1);box-shadow:0 10px 28px rgba(0,0,0,.22)}
.app-tab{position:relative;flex:1;padding:13px 10px;background:transparent;border:none;color:var(--sub);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.18s}
.app-tab+.app-tab{border-left:1px solid rgba(255,255,255,.05)}
.app-tab.on{background:linear-gradient(180deg, color-mix(in srgb,var(--cc) 14%, var(--s2)), var(--s2));color:#fff;box-shadow:inset 0 -2px 0 color-mix(in srgb,var(--cc) 65%, transparent)}
.app-tab small{display:block;font-size:11px;font-weight:700;color:var(--dk);margin-top:2px}
.app-tab.on small{color:color-mix(in srgb,var(--cc) 65%, #fff)}
.guide-tab{display:none}
.guide-list{display:flex;flex-direction:column;gap:10px}
.guide-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px}
.guide-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.guide-head-main{min-width:0;flex:1}
.guide-title{font-size:18px;font-weight:800;color:var(--tx);line-height:1.2}
.guide-desc{font-size:13px;color:var(--sub);line-height:1.6}
.guide-meta{margin-top:8px;font-size:12px;color:var(--dim);line-height:1.6}

.build-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px 8px;margin-top:8px;font-size:12px;color:var(--dim);line-height:1.6}
.build-completion{position:relative;display:inline-flex;align-items:center;gap:8px;padding:2px 0 2px 2px;white-space:nowrap}
.build-completion.rank-up{animation:completionPop .75s cubic-bezier(.2,.9,.2,1)}
.flame-wrap{position:relative;width:22px;height:26px;display:inline-block;flex:0 0 auto}
.flame-icon{position:absolute;left:2px;bottom:0;width:18px;height:24px;border-radius:60% 60% 55% 55%/72% 72% 34% 34%;transform-origin:50% 100%;filter:drop-shadow(0 0 8px rgba(251,191,36,.25));animation:flameFlicker 1.05s ease-in-out infinite;background:radial-gradient(circle at 50% 72%, rgba(255,246,214,.98) 0 16%, rgba(255,214,102,.98) 24%, rgba(251,191,36,.96) 42%, rgba(245,124,0,.9) 68%, rgba(190,24,93,.72) 100%)}
.flame-icon::before{content:'';position:absolute;left:4px;top:2px;width:10px;height:12px;border-radius:60% 60% 50% 50%/66% 66% 34% 34%;background:radial-gradient(circle at 50% 72%, rgba(255,251,235,.98) 0 26%, rgba(254,240,138,.86) 48%, rgba(254,240,138,0) 100%);opacity:.95}
.flame-burst,.flame-ring,.flame-sparks{position:absolute;pointer-events:none;opacity:0}
.flame-burst{inset:-14px;border-radius:999px}
.flame-ring{inset:-10px;border-radius:999px;border:1px solid rgba(255,255,255,.2);transform:scale(.4)}
.flame-sparks{inset:-18px;filter:blur(.3px)}
.flame-sparks::before,.flame-sparks::after{content:'';position:absolute;inset:0;background:
  radial-gradient(circle at 28% 35%, rgba(255,255,255,.95) 0 1.8px, transparent 2.2px),
  radial-gradient(circle at 64% 24%, rgba(255,255,255,.9) 0 1.6px, transparent 2px),
  radial-gradient(circle at 78% 48%, rgba(255,255,255,.9) 0 1.8px, transparent 2.1px),
  radial-gradient(circle at 34% 74%, rgba(255,255,255,.8) 0 1.5px, transparent 1.9px),
  radial-gradient(circle at 70% 70%, rgba(255,255,255,.85) 0 1.7px, transparent 2px)}
.build-completion.rank-up .flame-burst{animation:flameBurst .85s cubic-bezier(.2,.8,.2,1)}
.build-completion.rank-up .flame-ring{animation:flameRing .9s ease-out}
.build-completion.rank-up .flame-sparks{animation:sparkBurst .95s ease-out}
.completion-text{font-size:12px;font-weight:800;letter-spacing:-.01em;color:rgba(224,228,238,.86);text-shadow:none;display:inline-block}
.completion-text .percent{font-weight:900}
.build-completion.level-1 .flame-icon{background:radial-gradient(circle at 50% 72%, rgba(229,186,132,.95) 0 12%, rgba(154,95,42,.92) 28%, rgba(103,64,34,.84) 58%, rgba(50,32,19,.55) 100%);filter:drop-shadow(0 0 6px rgba(154,95,42,.18));animation-duration:1.28s}
.build-completion.level-1 .completion-text{color:#b98556}
.build-completion.level-2 .flame-icon{background:radial-gradient(circle at 50% 72%, rgba(243,246,251,.94) 0 14%, rgba(191,199,213,.94) 24%, rgba(137,147,163,.90) 54%, rgba(84,95,115,.72) 100%);filter:drop-shadow(0 0 7px rgba(148,163,184,.22));animation-duration:1.04s}
.build-completion.level-2 .completion-text{color:#c8d0de}
.build-completion.level-3 .flame-icon{background:radial-gradient(circle at 50% 72%, rgba(255,246,214,.98) 0 14%, rgba(245,198,84,.98) 24%, rgba(206,145,44,.95) 52%, rgba(125,84,26,.80) 100%);filter:drop-shadow(0 0 10px rgba(245,198,84,.30));animation-duration:.94s}
.build-completion.level-3 .completion-text{background:linear-gradient(90deg,#fff1c4 0%,#f1c25c 24%,#fff1c4 50%,#bf8730 76%,#fff1c4 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-shadow:none;animation:textSweepBg 3.4s linear infinite}
.build-completion.level-4 .flame-icon{background:radial-gradient(circle at 50% 72%, rgba(255,247,226,.98) 0 12%, rgba(255,184,76,.98) 18%, rgba(255,108,56,.97) 42%, rgba(212,58,37,.92) 68%, rgba(118,16,24,.78) 100%);filter:drop-shadow(0 0 12px rgba(239,68,68,.38));animation-duration:.82s}
.build-completion.level-4 .completion-text{background:linear-gradient(90deg,#ffe7b8 0%,#ffb347 18%,#ff7a4f 42%,#ffd38f 66%,#ff9c54 100%);background-size:230% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-shadow:none;animation:textSweepBg 2.4s linear infinite}
.build-completion.level-5 .flame-icon{background:linear-gradient(135deg,#fff4b1 2%,#ff9ad8 16%,#8be9ff 34%,#fff07d 50%,#d4b3ff 68%,#ff889e 84%,#fff4b1 100%);background-size:230% 230%;filter:drop-shadow(0 0 14px rgba(192,132,252,.46));animation:flameFlicker .78s ease-in-out infinite, prismShift 1.9s linear infinite}
.build-completion.level-5 .flame-icon::after{content:'';position:absolute;inset:-5px;border-radius:999px;background:conic-gradient(from 0deg, rgba(255,255,255,0), rgba(255,255,255,.48), rgba(255,255,255,0), rgba(255,255,255,.35), rgba(255,255,255,0));filter:blur(3px);opacity:.8;animation:prismShift 1.75s linear infinite}
.build-completion.level-5 .completion-text{background:linear-gradient(90deg,#fff6ca 0%,#ffc8e6 22%,#bcf4ff 44%,#fff0a8 66%,#dfc3ff 88%,#fff6ca 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-shadow:none;animation:textSweepBg 1.6s linear infinite}
.build-completion.level-1 .flame-burst{background:radial-gradient(circle, rgba(205,127,50,.42) 0, rgba(205,127,50,.2) 36%, rgba(205,127,50,0) 74%)}
.build-completion.level-2 .flame-burst{background:radial-gradient(circle, rgba(226,232,240,.6) 0, rgba(203,213,225,.28) 40%, rgba(203,213,225,0) 78%)}
.build-completion.level-3 .flame-burst{background:radial-gradient(circle, rgba(255,225,107,.62) 0, rgba(255,184,61,.3) 40%, rgba(255,184,61,0) 78%)}
.build-completion.level-4 .flame-burst{background:radial-gradient(circle, rgba(255,217,102,.64) 0, rgba(255,108,56,.34) 42%, rgba(229,57,53,0) 80%)}
.build-completion.level-5 .flame-burst{background:radial-gradient(circle, rgba(255,255,255,.72) 0, rgba(217,70,239,.36) 26%, rgba(34,211,238,.3) 46%, rgba(250,204,21,.22) 64%, rgba(255,255,255,0) 84%)}
@keyframes flameFlicker{0%{transform:translateY(0) scale(.94)}22%{transform:translateY(-1.4px) scale(1.02)}54%{transform:translateY(-3px) scale(1.16)}100%{transform:translateY(0) scale(.97)}}
@keyframes completionPop{0%{transform:scale(1)}28%{transform:scale(1.14)}55%{transform:scale(.98)}100%{transform:scale(1)}}
@keyframes flameBurst{0%{opacity:0;transform:scale(.28)}24%{opacity:1;transform:scale(.9)}55%{opacity:.9;transform:scale(1.35)}100%{opacity:0;transform:scale(1.85)}}
@keyframes flameRing{0%{opacity:.1;transform:scale(.36)}25%{opacity:.72;transform:scale(.96)}100%{opacity:0;transform:scale(1.58)}}
@keyframes sparkBurst{0%{opacity:0;transform:scale(.45) rotate(0deg)}28%{opacity:1;transform:scale(1) rotate(8deg)}100%{opacity:0;transform:scale(1.55) rotate(18deg)}}
@keyframes textSweep{0%,12%{transform:translateX(-120%)}32%,100%{transform:translateX(135%)}}
@keyframes textSweepBg{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes prismShift{0%{background-position:0% 50%}100%{background-position:220% 50%}}

.fireworks{position:absolute;left:0;top:50%;width:0;height:0;pointer-events:none}
.fireworks::before,.fireworks::after{content:'';position:absolute;left:0;top:0;width:3px;height:3px;border-radius:999px;opacity:0;transform:translate(-50%,-50%) scale(.2);}
.build-completion.perfect .fireworks::before{background:radial-gradient(circle, rgba(255,255,255,.95) 0 20%, rgba(255,215,80,.95) 42%, rgba(255,105,180,.82) 68%, rgba(255,255,255,0) 74%);box-shadow:0 0 0 0 rgba(255,255,255,.0);animation:fireworkBlastA 1.15s ease-out infinite}
.build-completion.perfect .fireworks::after{background:radial-gradient(circle, rgba(255,255,255,.95) 0 20%, rgba(124,232,255,.95) 42%, rgba(218,112,255,.82) 68%, rgba(255,255,255,0) 74%);animation:fireworkBlastB 1.25s .2s ease-out infinite}
@keyframes fireworkBlastA{0%{opacity:0;transform:translate(-16px,-50%) scale(.15)}12%{opacity:1}100%{opacity:0;transform:translate(-16px,-50%) scale(1.5)}}
@keyframes fireworkBlastB{0%{opacity:0;transform:translate(110px,-54%) scale(.15)}12%{opacity:1}100%{opacity:0;transform:translate(110px,-54%) scale(1.55)}}

.guide-rep-row{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.guide-rep-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:var(--s2);color:#d9dbe3;font-size:12px;font-weight:700;line-height:1;cursor:pointer;font-family:inherit;max-width:100%}
.guide-rep-badge .k{color:var(--dim);font-weight:700;flex-shrink:0}
.guide-rep-badge .v{color:var(--tx);font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guide-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.guide-btn{padding:10px 12px;border-radius:10px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.guide-btn.primary{border-color:var(--cc);color:var(--cc)}
.build-btn{padding:9px 16px;border-radius:20px;border:1.5px solid var(--bd2);background:var(--s2);color:var(--dim);font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
.build-btn.on{border-color:var(--bc);color:var(--bc);background:color-mix(in srgb,var(--bc) 14%,transparent);font-weight:700}
.build-info{margin-top:10px;font-size:14px;color:var(--sub);line-height:1.7}
/* 보상 */
.reward-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.reward-slot{border-radius:10px;border:2px dashed var(--bd2);background:var(--s2);cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:.15s}
.reward-slot:hover{border-color:var(--dim)}
.reward-slot.filled{border-style:solid;border-color:var(--bd2)}
.reward-slot .rs-ph{font-size:14px;color:var(--dk);font-weight:600;text-align:center;padding:32px 0}
.reward-slot .rs-img{width:100%;display:block;border-radius:8px}
.reward-slot .rs-name{position:absolute;bottom:0;left:0;right:0;padding:12px 4px 6px;background:linear-gradient(transparent,rgba(0,0,0,.88));font-size:13px;font-weight:700;color:#fff;text-align:center}
.reward-slot .rs-tier{position:absolute;top:5px;right:5px;font-size:11px;font-weight:800;color:#fff;padding:3px 7px;border-radius:6px}
.reward-slot .rs-clear{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:14px;cursor:pointer;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.tier-S{background:#ef4444}.tier-A{background:#f59e0b}.tier-B{background:#3b82f6}.tier-C{background:#6b7280}.tier-D{background:#4b5563}
/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal-box{background:var(--s1);border-radius:18px;width:100%;max-width:400px;height:80vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--bd2)}
.modal-top{padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.modal-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.modal-top h2{font-size:17px;font-weight:800}
.modal-close{background:var(--bd2);border:none;color:var(--sub);font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.modal-top input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:15px;outline:none;font-family:inherit}
.modal-body{overflow-y:auto;flex:1;padding:10px 12px 16px;overscroll-behavior:contain}
.search-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sg-card{position:relative;border-radius:8px;overflow:visible;cursor:pointer;border:1.5px solid var(--bd2);background:var(--s2)}
.sg-card:active{transform:scale(.97)}
.sg-card img{width:100%;display:block}
.sg-card .sg-ph{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--dk)}
.sg-card .sg-name{position:absolute;bottom:0;left:0;right:0;padding:10px 3px 5px;background:linear-gradient(transparent,rgba(0,0,0,.9));font-size:12px;font-weight:700;color:#fff;text-align:center}
.sg-card .sg-tier{position:absolute;top:4px;right:4px;font-size:9px;font-weight:800;color:#fff;padding:2px 5px;border-radius:4px}
.sg-card .sg-info{position:absolute;top:4px;left:4px;font-size:9px;font-weight:600;color:#ccc;background:rgba(0,0,0,.5);padding:2px 6px;border-radius:4px}
.sg-card .unlock-mini{display:none}
.lock-corner{position:absolute;left:50%;right:auto;bottom:18px;transform:translateX(-50%);width:18px;height:18px;border-radius:999px;background:#11131b;border:1.5px solid rgba(251,191,36,.5);box-shadow:0 2px 6px rgba(0,0,0,.24);display:flex;align-items:center;justify-content:center;color:#fbbf24;font-size:10px;font-weight:900;z-index:4;pointer-events:none}.lock-bottom{position:absolute;left:50%;right:auto;bottom:18px;transform:translateX(-50%);width:18px;height:18px;border-radius:999px;background:#11131b;border:1.5px solid rgba(251,191,36,.5);box-shadow:0 2px 6px rgba(0,0,0,.24);display:flex;align-items:center;justify-content:center;color:#fbbf24;font-size:10px;font-weight:900;z-index:4;pointer-events:none}
.combo-card-link{color:rgb(96, 165, 250);font-weight:700;text-decoration:underline;cursor:pointer}
.search-empty{text-align:center;color:var(--dk);font-size:15px;padding:40px 0}
/* 결과 */
.res-item{border-radius:14px;padding:16px;margin-bottom:10px;border:1.5px solid var(--bd);background:var(--s2)}
.res-item.best{background:#0f1f0f;border-color:#22c55e44}
.res-item.skip-best{background:#1f1a0f;border-color:#f59e0b44}
.res-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.res-badge{font-size:13px;font-weight:800;padding:4px 10px;border-radius:6px;color:#fff}
.res-state{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 8px}
.res-chip{font-size:11px;font-weight:700;padding:4px 8px;border-radius:999px;background:var(--s1);border:1px solid var(--bd2);color:var(--sub)}
.res-chip.good{color:#34d399;border-color:#1f6f56;background:rgba(52,211,153,.08)}
.res-chip.mid{color:#fbbf24;border-color:#6b4d10;background:rgba(251,191,36,.08)}
.res-chip.bad{color:#f87171;border-color:#6f2d2d;background:rgba(248,113,113,.08)}
.res-summary{font-size:14px;color:var(--tx);font-weight:700;line-height:1.45;margin-bottom:4px}
.res-unlock-mini{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;color:#fbbf24;line-height:1.2;margin-top:4px;padding:3px 7px;border-radius:999px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.22)}
.res-note{font-size:13px;color:var(--sub);line-height:1.5}
.res-reason{font-size:13px;color:var(--sub);line-height:1.55}
.res-reason.warn{color:#f87171;font-weight:600}
.state-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.state-box{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:10px 12px}
.state-k{font-size:11px;color:var(--dim);margin-bottom:4px;font-weight:700;letter-spacing:.02em}
.state-v{font-size:14px;color:var(--tx);font-weight:800;line-height:1.35}
.res-btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:.15s}
.res-btn.pick{border:none;background:#22c55e;color:#fff}
.res-btn.ghost{border:1px solid var(--bd2);background:transparent;color:var(--dim)}
/* 덱 */
.deck-head{display:flex;justify-content:space-between;align-items:center}
.deck-head span{font-size:16px;font-weight:800;color:var(--tx)}
.deck-reset{background:none;border:none;color:rgb(229,115,104);font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;display:inline-flex;align-items:center;gap:6px}.deck-reset svg{width:14px;height:14px;display:block}
.deck-grid{margin-top:12px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.dk-card{position:relative;border-radius:8px;overflow:hidden;border:1.5px solid var(--bd2);background:var(--s2);cursor:pointer}
.dk-card.must{border-color:#ef444466}.dk-card.rec{border-color:#22c55e44}
.dk-card img{width:100%;display:block}
.dk-card .dk-ph{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--dk)}

<div class="hdr">

</div>

    </div>
    <div class="reward-row" id="rewardRow"></div>
    <div class="inline-result" id="resultSection" style="display:none"><div class="card-label">추천 결과</div><div id="resultBody"></div></div>

const CHO='ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ'.split('');
const CHO_SET=new Set(CHO);
const COMPOUND={ㄳ:'ㄱㅅ',ㄵ:'ㄴㅈ',ㄶ:'ㄴㅎ',ㄺ:'ㄹㄱ',ㄻ:'ㄹㅁ',ㄼ:'ㄹㅂ',ㄽ:'ㄹㅅ',ㄾ:'ㄹㅌ',ㄿ:'ㄹㅍ',ㅀ:'ㄹㅎ',ㅄ:'ㅂㅅ'};
function decompose(s){return[...s].map(c=>COMPOUND[c]||c).join('')}
function getChosung(s){return[...s].map(c=>{const d=c.charCodeAt(0)-0xAC00;return d<0||d>11171?c:CHO[Math.floor(d/588)]}).join('')}
function isChosungLike(s){return[...s].every(c=>CHO_SET.has(c)||c in COMPOUND)}
function matchSearch(name,q){return getSearchRank(name,q)>-1}
function getSearchRank(name,q){
  if(!q) return 0;
  q=q.replace(/\s/g,'');
  const n=name.replace(/\s/g,'');
  const nLow=n.toLowerCase(), qLow=q.toLowerCase();
  const idx=nLow.indexOf(qLow);
  if(idx===0) return 1000-q.length;
  if(idx>0) return 700-idx;
  const chosung=getChosung(n), dq=decompose(q);
  if(isChosungLike(q)){
    const cidx=chosung.indexOf(dq);
    if(cidx===0) return 950-dq.length;
    if(cidx>0) return 650-cidx;
  }
  return -1;
}

    document.body.classList.add('modal-lock');
    document.body.style.top=`-${window.__scrollY}px`;

    const y=Math.abs(parseInt(document.body.style.top||'0',10))||window.__scrollY||0;
    document.body.classList.remove('modal-lock');
    document.body.style.top='';
    window.scrollTo(0,y);
  }
}

function getComboMatches(name,d){
  const full=[],partial=[];
  (d.combos||[]).forEach(cb=>{
    if(!cb.cards.includes(name)) return;
    const others=cb.cards.filter(x=>x!==name);
    const have=others.filter(x=>deck.includes(x));
    if(have.length===others.length) full.push({cb,have,missing:[]});
    else if(have.length>0) partial.push({cb,have,missing:others.filter(x=>!deck.includes(x))});
  });
  return {full,partial};
}
function getCardBuildRefs(name,d){
  return (d.archs||[]).filter(a=>a.must.includes(name)||a.rec.includes(name));
}
function getRunStage(){
  const base=(START_DECKS[curChar]||[]).length||10;
  const added=Math.max(0,deck.length-base);
  const shopRuns=hist.filter(h=>Array.isArray(h.f)&&h.f.length===5).length;
  const picked=hist.filter(h=>h.p && h.p!=='스킵').length;
  let score=added*10 + shopRuns*12 + picked*4;
  if(added<=4) score-=10;
  if(added>=10) score+=10;
  const stage=score<45?'early':(score<95?'mid':'late');
  return {score,added,shopRuns,picked,stage};
}
function isAct1Like(){
  return getRunStage().stage==='early';
}
const BUILD_COMPLETION_MEM={};
function getBuildCompletionState(a,mh,rh){
  const mustTotal=Math.max(1,(a.must||[]).length);
  const recTotal=Math.max(1,(a.rec||[]).length);
  const mustRatio=Math.min(1,mh/mustTotal);
  const recRatio=Math.min(1,rh/recTotal);
  let pct=Math.round(mustRatio*35 + recRatio*45 + (mh>0?8:0) + (mh>=mustTotal?12:0));
  pct=Math.max(0,Math.min(100,pct));
  let level=1;
  if(pct>=100) level=5;
  else if(pct>=85) level=4;
  else if(pct>=60) level=3;
  else if(pct>=40) level=2;
  return {pct,level};
}
function renderBuildCompletion(a,mh,rh){
  const st=getBuildCompletionState(a,mh,rh);
  const key=`${curChar}:${a.id}`;
  const prev=BUILD_COMPLETION_MEM[key];
  const rankUp=!!prev && st.level>prev.level;
  BUILD_COMPLETION_MEM[key]=st;
  const suffix=rankUp?'!':'';
  const perfect=st.pct>=100;
  return `<span class="build-completion level-${st.level}${rankUp?' rank-up':''}${perfect?' perfect':''}"><span class="flame-wrap"><span class="flame-burst"></span><span class="flame-ring"></span><span class="flame-sparks"></span><span class="flame-icon"></span></span><span class="completion-text">${a.name} 완성도 <span class="percent">${st.pct}%</span>${suffix}</span>${perfect?'<span class=\"fireworks\"></span>':''}</span>`;
}

function detectBuildScores(){
  const d=D();
  return d.archs.map(a=>{
    const mustHits=a.must.filter(n=>deck.includes(n)).length;
    const recHits=a.rec.filter(n=>deck.includes(n)).length;
    let score=0;
    score += mustHits*42;
    score += recHits*16;
    if(mustHits>0 && recHits>0) score += 22;
    else if(mustHits>0) score += 14;
    else if(recHits>=2) score += 10;
    return {id:a.id,score,mh:mustHits,rh:recHits};
  }).sort((a,b)=>b.score-a.score);
}
function detectBuild(){
  const scored=detectBuildScores();
  const top=scored[0], second=scored[1];
  if(!top || top.score<36) return null;
  if(second && top.score-second.score<12 && top.score<72) return null;
  return top.id;
}
function getActiveBuild(){return buildId||detectBuild()}


function scoreCard(name){
  const d=D();const c=d.cards.find(x=>x.n===name);
  if(!c)return{score:0,reasons:['정보 없음'],tier:'?',warn:false,summary:'정보 없음',chips:[['mid','판단 보류']]};
  const activeBid=getActiveBuild();
  const activeBuild=activeBid?d.archs.find(x=>x.id===activeBid):null;
  const runStage=getRunStage();
  let s=TS[c.tier]||0;const R=[];const chips=[];let warn=false;
  const dupes=deck.filter(x=>x===name).length;
  const totalCards=deck.length;
  const early=runStage.stage==='early';
  const mid=runStage.stage==='mid';
  const late=runStage.stage==='late';
  const combo=getComboMatches(name,d);
  const buildRefs=getCardBuildRefs(name,d);
  const inActive=!!(activeBuild&&(activeBuild.must.includes(name)||activeBuild.rec.includes(name)));
  const basicSet=new Set(BA());
  const cost=(typeof c.c==='number') ? c.c : (c.c==='X'?1:1);
  const cheap=cost<=1;
  const hasAny=(arr)=>arr.some(n=>deck.includes(n));
  const soulEnablers=['강탈','장송가','출몰','혼령 포획','강령회','분리'];
  const buildRefsAll=getCardBuildRefs(name,d);
  const mustRefs=buildRefsAll.filter(a=>a.must.includes(name));
  const recRefs=buildRefsAll.filter(a=>a.rec.includes(name));

  if(curChar==='necro' && name==='영혼 폭풍' && !hasAny(soulEnablers)){
    s-=26; warn=true; chips.push(['bad','엔진 없음']); R.push('영혼 생성 카드가 아직 없어 기대값이 낮음');
  }

  if(combo.full.length){
    s+=70; chips.push(['good','즉시 연결']); R.push(`${combo.full[0].have.join(', ')}와 바로 작동`);
  }else if(combo.partial.length){
    s+=28; chips.push(['mid','조건부 연결']); R.push(`${combo.partial[0].have.join(', ')}와 연결 가능`);
  }

  if(activeBuild){
    if(activeBuild.must.includes(name)){
      s+=62; chips.push(['good','필수']); R.push(`${activeBuild.name} 필수 카드`);
    }else if(activeBuild.rec.includes(name)){
      s+=30; chips.push(['good','핵심']); R.push(`${activeBuild.name} 핵심 카드`);
    }else if(buildRefs.length && !early){
      s-=12; warn=true; chips.push(['bad','오프빌드']); R.push(`지금 방향과는 거리 있음`);
    }
  }else{
    if(mustRefs.length){
      s+=26; chips.push(['mid','빌드 시동']); R.push(`${mustRefs[0].name} 방향을 열어주는 카드`);
    }else if(recRefs.length){
      s+=12; chips.push(['mid','빌드 후보']); R.push(`${recRefs[0].name} 후보 카드`);
    }
  }

  if(d.uni.includes(name) && dupes===0){
    s+=18; chips.push(['mid','범용']); R.push('단독 성능이 좋은 카드');
  }

  if(early){
    if((c.tier==='S'||c.tier==='A') && dupes===0){
      s+=10;
      if(!chips.some(([k,v])=>v==='즉시 연결'||v==='필수'||v==='핵심'||v==='빌드 시동')) chips.push(['mid','초반 안정성']);
    }
    if(c.t==='공격' && cheap){ s+=12; if(!chips.some(([k,v])=>v==='초반 안정성')) chips.push(['mid','전투력']); }
    if(c.t==='스킬' && cheap && c.tier==='A') s+=4;
    if(c.t==='파워' && !combo.full.length && !inActive && c.tier!=='S' && !mustRefs.length){ s-=14; R.push('지금은 바로 강해지지 않음'); }
  }else if(mid){
    if(c.t==='파워' && inActive) s+=10;
    if(mustRefs.length) s+=8;
  }else if(late){
    if(c.t==='파워' && inActive) s+=12;
    if(combo.partial.length) s+=6;
  }

  if(totalCards>=18 && !inActive && !combo.full.length && c.tier!=='S' && !mustRefs.length){
    s-=18; warn=true; chips.push(['bad','덱 오염']); R.push('덱이 커져서 회전이 느려짐');
  }else if(totalCards>=15 && !inActive && !combo.full.length && c.tier==='B' && !mustRefs.length){
    s-=8; R.push('지금은 우선순위 낮음');
  }

  if(dupes>=2){
    s-=55; warn=true; chips.push(['bad','중복']); R.push(`이미 ${dupes}장 보유`);
  }else if(dupes===1){
    if(['폼멜타격','촉진제','촉매','계산된 도박','곡예'].includes(name)){
      s+=6; R.push('2장째도 고려 가능');
    }else{
      s-=26; warn=true; chips.push(['bad','중복']); R.push('이미 1장 있음');
    }
  }

  if(c.tier==='D'){s-=25;warn=true;chips.push(['bad','기본 카드']);R.push('기본 카드는 줄이는 편이 좋음')}
  if(basicSet.has(name) && totalCards>10){s-=20;warn=true; if(!R.some(r=>r.includes('기본'))) R.push('기본 카드는 교체 대상');}

  if(!R.length) R.push(c.tip||'무난한 카드');
  R.splice(0,2);
  let summary='지금 뽑아도 무난함';
  if(chips.some(c=>c[1]==='즉시 연결')) summary='지금 덱과 바로 연결됨';
  else if(chips.some(c=>c[1]==='필수')) summary='현재 방향의 핵심 카드';
  else if(chips.some(c=>c[1]==='핵심')) summary='현재 방향 강화 카드';
  else if(chips.some(c=>c[1]==='빌드 시동')) summary='지금 집으면 한 빌드 방향을 열기 좋음';
  else if(chips.some(c=>c[1]==='빌드 후보')) summary='후속 카드가 붙으면 빌드 후보가 될 수 있음';
  else if(chips.some(c=>c[1]==='오프빌드')) summary='좋은 카드여도 지금 방향과는 거리가 있음';
  else if(chips.some(c=>c[1]==='엔진 없음')) summary='핵심 재료가 없어 지금은 기대값이 낮음';
  else if(chips.some(c=>c[1]==='전투력')||chips.some(c=>c[1]==='초반 안정성')) summary='초반 전투력 보강용으로 좋음';
  else if(chips.some(c=>c[1]==='덱 오염')) summary='지금은 넣을수록 덱이 무거워짐';
  return {score:s,reasons:R,tier:c.tier,warn,summary,chips};
}

const REPO_API='https://api.github.com/repos/elithelucky/sts2-images/contents/';
let REPO_LOADED=false;
let REPO_CARD_NAMES_BY_CHAR={ironclad:[],silent:[],defect:[],necro:[],regent:[]};
let REPO_RELIC_NAMES=[];
let REPO_RELIC_SET=new Set();
function normalizeCardName(s){return (s||'').replace(/\s+/g,'').replace(/[!'?.,:+\-]/g,'')}
function relicImgSrc(name){const base=(name||'').replace(/\s+/g,'').replace(/[!'?.,:+\-]/g,'');return IMG+encodeURIComponent(base)+'.webp'}
function makeRelicImg(name){const img=document.createElement('img');img.className='relic-tile-img';img.loading='lazy';img.onerror=function(){const ph=document.createElement('div');ph.className='relic-tile-ph';ph.textContent='유물';this.replaceWith(ph)};img.src=relicImgSrc(name);return img}
async function enrichCardsFromRepo(){
  if(REPO_LOADED) return;
  try{
    const res=await fetch(REPO_API);
    if(!res.ok) return;
    const files=await res.json();
    const suffixToChar={Ironclad:'ironclad',Silent:'silent',Defect:'defect',Necrobinder:'necro',Regent:'regent'};
    const byChar={ironclad:IC_CARDS,silent:SI_CARDS,defect:DE_CARDS,necro:NE_CARDS,regent:RE_CARDS};
    const repoNames={ironclad:[],silent:[],defect:[],necro:[],regent:[]};
    const relicNames=[];

    (files||[]).forEach(f=>{
      if(!f.name || !/\.webp$/i.test(f.name)) return;
      const base=f.name.replace(/\.webp$/i,'');
      const m=base.match(/^(.+?)_(Ironclad|Silent|Defect|Necrobinder|Regent)$/);
      if(m){
        const rawName=m[1];
        const charKey=suffixToChar[m[2]];
        repoNames[charKey].push(rawName);
      }else{
        relicNames.push(base);
      }
    });

    REPO_RELIC_NAMES=[...new Set(relicNames)];
    REPO_RELIC_SET=new Set(REPO_RELIC_NAMES.map(normalizeCardName));

    Object.entries(byChar).forEach(([charKey,arr])=>{
      const metaByNorm=new Map(arr.map(c=>[normalizeCardName(c.n),c]));
      const unique=[];
      const seen=new Set();
      repoNames[charKey].forEach(name=>{
        const clean=normalizeCardName(name);
        if(seen.has(clean)) return;
        seen.add(clean);
        unique.push(metaByNorm.get(clean)||{n:name,c:'?',t:'카드',r:'기타',tier:'B',tip:'정보 준비중'});
      });
      arr.splice(0,arr.length,...unique.sort((a,b)=>a.n.localeCompare(b.n,'ko')));
      REPO_CARD_NAMES_BY_CHAR[charKey]=unique.map(c=>c.n);
    });
    REPO_LOADED=true;
  }catch(e){console.warn('repo enrich failed',e)}
}

function attachCharRowDrag(){
  const row=document.getElementById('charRow');
  if(!row || row.dataset.dragBound==='1') return;
  row.dataset.dragBound='1';
  let isDown=false,startX=0,startLeft=0,moved=false;
  const end=()=>{isDown=false;row.classList.remove('dragging')};
  row.addEventListener('mousedown',e=>{
    isDown=true; moved=false; startX=e.pageX; startLeft=row.scrollLeft; row.classList.add('dragging');
  });
  row.addEventListener('mousemove',e=>{
    if(!isDown) return;
    const dx=e.pageX-startX;
    if(Math.abs(dx)>4) moved=true;
    row.scrollLeft=startLeft-dx;
  });
  row.addEventListener('mouseleave',end);
  window.addEventListener('mouseup',end);
  row.addEventListener('click',e=>{ if(moved) { e.preventDefault(); e.stopPropagation(); moved=false; } }, true);
}

function getSkipScore(){
  const activeBid=getActiveBuild();const d=D();const a=activeBid?d.archs.find(x=>x.id===activeBid):null;
  const early=isAct1Like();
  if(early) return totalCards=deck.length, totalCards>=16?18:6;
  if(!a) return deck.length>=16?16:8;
  const md=a.must.filter(n=>deck.includes(n)).length;
  const rd=a.rec.filter(n=>deck.includes(n)).length;
  if(md===0&&rd===0) return deck.length>=16?16:8;
  if(md<a.must.length) return deck.length>=17?18:10;
  return deck.length>=16?20:14;
}

  const need=(mode==='shop'?5:3);
  if(currentTab==='live' && scrollMode==='to-result' && filled.length===need) scrollToRecommendations();
  if(currentTab==='live' && scrollMode==='to-picker') scrollToPickerTop();
}


function scrollToRecommendations(){
  const sec=document.getElementById('resultSection');
  if(!sec||sec.style.display==='none') return;
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}
function scrollToPickerTop(){
  const sec=document.getElementById('pickerSection');
  if(!sec) return;
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),60);
}

// ═══════════════════════════════════════
let buildPanelOpen=true;
function changeChar(k){curChar=k;buildId=null;deck=[...START_DECKS[k]];picks=freshPicks();hist=[];selectedDeckIdx=-1;historyOpen=false;buildPanelOpen=true;renderAll()}
function selectBuild(id){buildId=(id==='auto')?null:(buildId===id?null:id);renderAll()}
function setMode(m){mode=m;picks=freshPicks();renderAll()}
function openSearch(i){activeSlot=i;deckAddMode=false;document.getElementById('modalTitle').textContent='카드 '+(i+1)+' 선택';document.getElementById('modalInput').value='';document.getElementById('searchModal').classList.add('open');updateBodyLock();renderSearchGrid();setTimeout(()=>document.getElementById('modalInput').focus(),100)}
function openDeckAdd(){deckAddMode=true;activeSlot=-1;document.getElementById('modalTitle').textContent='덱에 카드 추가';document.getElementById('modalInput').value='';document.getElementById('searchModal').classList.add('open');updateBodyLock();renderSearchGrid();setTimeout(()=>document.getElementById('modalInput').focus(),100)}
function closeSearch(){document.getElementById('searchModal').classList.remove('open');activeSlot=-1;deckAddMode=false;updateBodyLock()}
function showDetail(name){
  const d=D();const c=d.cards.find(x=>x.n===name);const body=document.getElementById('detailBody');const srcs=imgSrcs(name);
  const modal=document.getElementById('detailModal');
  if(modal.classList.contains('open')){
    detailStack.push({html:body.innerHTML,mode:modal.dataset.mode||''});
  }
  const tierC={S:'#ef4444',A:'#f59e0b',B:'#3b82f6',C:'#6b7280',D:'#4b5563'};const tierL={S:'S — 최우선',A:'A — 좋음',B:'B — 상황따라',C:'C — 비추',D:'D — 소멸 대상'};
  const relA=d.archs.filter(a=>a.must.includes(name)||a.rec.includes(name));const relC=d.combos.filter(cb=>cb.cards.includes(name));const inD=deck.includes(name);
  const unlockCond=UNLOCK[name];
  const comboText=(cb)=>{
    const others=cb.cards.filter(x=>x!==name);
    const parts=others.map(p=>`<span class="combo-card-link" onclick="event.stopPropagation();showDetail('${p.replace(/'/g, '&#39;')}')">${p}</span>`);
    return parts.join(' · ');
  };
  let h=`<img class="detail-img" src="${srcs[0]}" onerror="this.onerror=null;this.src='${srcs[1]||srcs[0]}'">`;
  if(unlockCond)h+=`<div style="margin:-2px 0 10px;padding:10px 12px;border-radius:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);font-size:13px;color:#fbbf24;line-height:1.5;text-align:center">🔒 해금 조건: ${unlockCond}</div>`;
  h+=`<div class="detail-name">${name}</div><div class="detail-meta">`;
  if(c){h+=`<span class="detail-chip" style="background:${tierC[c.tier]};color:#fff">${tierL[c.tier]||c.tier}</span><span class="detail-chip" style="background:var(--bd2);color:var(--sub)">${c.t}</span><span class="detail-chip" style="background:var(--bd2);color:var(--sub)">${c.c==='X'?'X':c.c}코스트</span><span class="detail-chip" style="background:var(--bd2);color:var(--sub)">${c.r}</span>`}
  h+=`</div>`;
  if(c&&c.tip)h+=`<div class="detail-section"><div class="detail-label">팁</div><div class="detail-text">${c.tip}</div></div>`;
  if(relA.length){h+=`<div class="detail-section"><div class="detail-label">관련 빌드</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;relA.forEach(a=>{h+=`<span class="detail-chip" style="background:${a.color}22;color:${a.color};border:1px solid ${a.color}44">${a.name} ${a.must.includes(name)?'필수':'추천'}</span>`});h+=`</div></div>`}
  if(relC.length){
    h+=`<div class="detail-section"><div class="detail-label">시너지 콤보</div>`;
    relC.forEach(cb=>{
      const partner=cb.cards.find(x=>x!==name);const has=partner&&deck.includes(partner);
      h+=`<div class="detail-combo" style="${has?'border-color:#22c55e44;background:#0f1f0f':''}"><div class="detail-combo-name">${cb.name} ${has?'<span style="color:#22c55e;font-size:11px">— 보유중!</span>':''}</div><div class="detail-combo-why">${comboText(cb)} — ${cb.why}</div></div>`
    });
    h+=`</div>`;
  }
  if(inD)h+=`<div style="text-align:center;padding:8px;font-size:13px;color:#22c55e;font-weight:700">✅ 내 덱에 보유중</div>`;
  h=`<button class="detail-top-close" onclick="closeDetail()">✕</button>`+h+`<button class="detail-close" onclick="closeDetail()">닫기</button>`;
  body.innerHTML=h;modal.classList.add('open');updateBodyLock()
}

function showBuildList(kind='all', liveLinked=false){
  const d=D(); const autoBid=detectBuild(); const currentBid=buildId||autoBid;
  const body=document.getElementById('detailBody');
  if(!currentBid){
    body.innerHTML=`<button class="detail-top-close" onclick="closeDetail()">✕</button><div class="detail-name">빌드 카드 리스트</div><div class="detail-section"><div class="detail-text">현재 덱 기준으로 가까운 빌드를 먼저 선택하면 필수 / 핵심 카드 리스트를 볼 수 있습니다.</div></div><button class="detail-close" onclick="closeDetail()">닫기</button>`;
    document.getElementById('detailModal').classList.add('open');
    updateBodyLock();
    return;
  }
  const a=d.archs.find(x=>x.id===currentBid);
  const uniq=(arr)=>[...new Set(arr)];
  const all=uniq([...a.must,...a.rec]);
  const esc=(s)=>String(s).replace(/'/g,"&#39;");
  const deckNow=deck.slice();
  const renderCards=(arr,label,cls)=>{
    if(!arr.length) return '';
    const extraClass = cls==='all' ? ' divided' : '';
    return `<div class="build-list-wrap ${cls}${extraClass}"><div class="build-list-head"><div class="build-list-title">${label}</div></div><div class="build-list-grid">${arr.map(n=>{
      const owned = liveLinked && deckNow.includes(n);
      return `<button class="build-list-card ${cls}" onclick="showDetail('${esc(n)}')"><img src="${imgSrcs(n)[0]}" onerror="this.onerror=null;this.src='${imgSrcs(n)[1]}';"><div class="build-list-footer">${owned?'<div class="build-list-owned"><span class="check"></span>덱에 있음</div>':''}${UNLOCK[n]?'<div class="build-list-lock">🔒</div>':''}<div class="build-list-name">${n}</div></div></button>`;
    }).join('')}</div></div>`;
  };
  let h=`<button class="detail-top-close" onclick="closeDetail()">✕</button><div class="detail-name">${a.name} 카드 리스트</div><div class="detail-meta"><span class="detail-chip" style="background:${a.color}22;color:${a.color};border:1px solid ${a.color}44">${a.desc}</span></div>`;
  if(kind==='must') h+=renderCards(a.must,'필수 카드','must');
  else if(kind==='rec') h+=renderCards(a.rec,'핵심 카드','core');
  else h+=renderCards(a.must,'필수 카드','must')+renderCards(a.rec,'핵심 카드','core')+renderCards(all,'전체 구성 카드','all');
  h+=`<button class="detail-close" onclick="closeDetail()">닫기</button>`;
  body.innerHTML=h;
  document.getElementById('detailModal').classList.add('open');
  updateBodyLock();
}

function closeDetail(){
  const modal=document.getElementById('detailModal');
  const body=document.getElementById('detailBody');
  if(detailStack.length){
    const prev=detailStack.pop();
    body.innerHTML=prev.html;
    modal.dataset.mode=prev.mode||'';
    modal.classList.add('open');
    updateBodyLock();
    return;
  }
  modal.classList.remove('open');
  modal.dataset.mode='';
  updateBodyLock();
}
function freshPicks(){return Array(mode==='shop'?5:3).fill('')}
function finalizeRewardCycle(actionName){const from=picks.filter(Boolean);if(actionName==='스킵') hist.push({p:'스킵',f:from});else hist.push({p:actionName,f:from});deckAddMode=false;activeSlot=-1;if(mode==='shop') mode='reward';picks=freshPicks();renderAll('to-picker')}
function pickCard(name){deck.push(name);finalizeRewardCycle(name)}
function doSkip(){finalizeRewardCycle('스킵')}
function toggleBuildPanel(){}
function toggleHistory(){}
function toggleDeck(){}
function resetAll(){deck=[...START_DECKS[curChar]];hist=[];picks=freshPicks();deckOpen=true;buildId=null;selectedDeckIdx=-1;historyOpen=false;buildPanelOpen=true;renderAll()}

document.getElementById('searchModal').addEventListener('click',function(e){if(e.target===this)closeSearch()});
document.addEventListener('click',function(e){if(selectedDeckIdx===-1) return; if(e.target.closest('.dk-wrap.selected')||e.target.closest('.dk-add')) return; selectedDeckIdx=-1; renderDeck();});
(async function init(){await enrichCardsFromRepo();renderAll()})();
