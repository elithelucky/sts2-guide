<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>슬더스2 가이드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--surface:#1a1c24;--surface2:#12131a;
  --border:#2a2c34;--text:#e8e6e3;--sub:#8a8d98;--dim:#5a5d68;
  --red:#e74c3c;--green:#27ae60;--yellow:#f1c40f;--blue:#3498db;
  --radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;font-size:15px;max-width:480px;margin:0 auto;min-height:100vh}

/* ── 헤더 ── */
.hdr{padding:14px 16px 0;background:var(--bg);position:sticky;top:0;z-index:30}
.hdr-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.char-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;padding-right:28px;scrollbar-width:none;cursor:grab;touch-action:pan-x}
.char-row::-webkit-scrollbar{display:none}
.char-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s}
.char-btn.on{color:var(--cc);border-color:var(--cc);background:color-mix(in srgb,var(--cc) 15%,transparent)}

/* ── 탭 ── */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:20}
.tab-btn{flex:1;padding:11px 0;background:none;border:none;color:var(--dim);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:.15s}
.tab-btn.on{color:var(--cc,#e74c3c);border-bottom-color:var(--cc,#e74c3c)}

.ct{padding:12px 14px 80px}

/* ── 섹션 ── */
.section{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.sec-title{font-size:15px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hint{font-size:13px;color:var(--sub);line-height:1.6}

/* ── 카드 그리드 ── */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

/* ── 카드 타일 ── */
.card-tile{position:relative;aspect-ratio:2/3;border-radius:8px;overflow:hidden;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2)}
.card-tile img{width:100%;height:100%;object-fit:cover;display:block}
.card-tile .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--sub)}
.card-tile .card-name{position:absolute;bottom:0;left:0;right:0;padding:12px 4px 5px;background:linear-gradient(transparent,rgba(0,0,0,.88));font-size:12px;font-weight:700;color:#fff;text-align:center;line-height:1.2}
.card-tile .cost-dot{position:absolute;top:3px;right:3px;background:var(--surface);border-radius:6px;font-size:9px;font-weight:900;color:#fff;padding:1px 4px;min-width:16px;text-align:center}
/* 빌드 태그 */
.card-tile .build-dot{position:absolute;top:3px;left:3px;border-radius:4px;font-size:8px;font-weight:800;padding:1px 4px;line-height:1.4}
/* 목표덱 미보유 카드 */
.card-tile.missing{opacity:.55;filter:grayscale(20%)}
.card-tile.missing::after{content:'';position:absolute;inset:0;border:2px dashed rgba(255,255,255,.4);border-radius:8px}
/* 선택됨 */
.card-tile.selected{border-color:var(--green) !important;box-shadow:0 0 0 2px var(--green)}
/* 오버레이 (정보/제거) */
.card-tile .card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;opacity:0;transition:.18s;border-radius:8px;pointer-events:none}
.card-tile.show-remove .card-overlay{opacity:1;pointer-events:all}
.card-overlay .ov-btn{display:flex;align-items:center;gap:5px;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;width:90px;justify-content:center}
.card-overlay .ov-info{background:rgba(52,152,219,.9);color:#fff}
.card-overlay .ov-del{background:rgba(231,76,60,.9);color:#fff}
.card-overlay .ov-cancel{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}

/* ── 카드 추가하기 타일 ── */
.add-tile{aspect-ratio:2/3;border-radius:8px;border:1.5px dashed var(--border);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:.15s}
.add-tile:hover{border-color:var(--sub);background:var(--surface2)}
.add-tile .plus{font-size:20px;color:var(--dim)}
.add-tile .add-txt{font-size:9px;font-weight:700;color:var(--dim);text-align:center;line-height:1.3}

/* ── 상태 뱃지 ── */
.status-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.badge{padding:4px 9px;border-radius:10px;font-size:12px;font-weight:700;background:var(--surface2);color:var(--sub)}
.badge.warn{background:rgba(241,196,15,.12);color:var(--yellow)}
.badge.good{background:rgba(39,174,96,.12);color:var(--green)}
.badge.info{background:rgba(52,152,219,.12);color:var(--blue)}

/* ── 방향 분석 ── */
.direction-box{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--cc,#555)}
.direction-title{font-size:15px;font-weight:800;color:var(--cc,#e8e6e3);margin-bottom:4px}
.direction-sub{font-size:12px;color:var(--sub);line-height:1.5}
.prog-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* ── 콤보 컨테이너 ── */
.combo-wrap{border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;background:#12161d;margin-top:14px}
.combo-wrap.open{border-color:rgba(255,255,255,.14);background:#10141a}
.combo-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#161b23;transition:.15s}
.combo-head:hover{background:#1a2029}
.combo-head.open{background:#1b222c;border-bottom:1px solid rgba(255,255,255,.08)}
.combo-head-left h3{font-size:16px;font-weight:800;line-height:1.2;color:var(--text)}
.combo-head-left p{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.5}
.combo-body{background:#12161d;padding:12px 12px 10px}
.combo-box{background:#171c24;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid rgba(255,255,255,.08)}
.combo-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.combo-title{font-size:14px;font-weight:800;margin:0}
.combo-meta{font-size:11px;color:var(--sub);padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);white-space:nowrap}
.combo-desc{font-size:12px;color:var(--sub);margin-bottom:10px;line-height:1.5}
.combo-cards-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.combo-cards-3{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.combo-cards-n{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}

/* ── 목표덱 ── */
.goal-toggle{width:100%;background:none;border:1px dashed var(--border);border-radius:8px;padding:10px;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:.15s;margin-top:4px}
.goal-toggle:hover{border-color:var(--sub);color:var(--text)}
.goal-active{background:var(--surface2);border-radius:8px;padding:10px;margin-top:8px;border:1px solid var(--border)}
.goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.goal-name{font-size:13px;font-weight:800}
.goal-clear{background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;font-family:inherit;padding:2px 6px}
.goal-minimal{background:var(--surface2);border-radius:12px;padding:12px;margin-top:10px;border:1.5px solid var(--border)}
.goal-topline{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.goal-meta{display:flex;flex-direction:column;gap:4px;min-width:0}
.goal-caption{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.goal-subcopy{font-size:12px;color:var(--sub);line-height:1.5}
.goal-chip-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 10px}
.goal-chip{padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800;background:var(--surface);border:1px solid var(--border)}
.goal-chip.red,.goal-chip.orange,.goal-chip.ghost{color:var(--text);border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
.goal-legend{font-size:11px;color:var(--dim);margin-bottom:8px}
.goal-blueprint-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.goal-card{position:relative;aspect-ratio:2/3;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);background:var(--surface);cursor:pointer}
.goal-card img{width:100%;height:100%;object-fit:cover;display:block}
.goal-card .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px;font-weight:800}
.goal-card .card-name{position:absolute;bottom:0;left:0;right:0;padding:12px 4px 5px;background:linear-gradient(transparent,rgba(0,0,0,.88));font-size:11px;font-weight:700;color:#fff;text-align:center;line-height:1.2}
.goal-card.pending{opacity:.38;filter:grayscale(22%)}
.goal-card.pending::after{content:'';position:absolute;inset:0;border:2px dashed rgba(255,255,255,.34);border-radius:8px}
.goal-card.owned{box-shadow:0 0 0 1px rgba(39,174,96,.25) inset}
.goal-card .goal-badge{position:absolute;top:4px;left:4px;padding:2px 5px;border-radius:5px;font-size:8px;font-weight:800;line-height:1.35}
.goal-card .goal-badge.must{background:rgba(231,76,60,.88);color:#fff}
.goal-card .goal-badge.key{background:rgba(243,156,18,.88);color:#fff}
.goal-card .goal-check{position:absolute;top:4px;right:4px;background:rgba(39,174,96,.92);color:#fff;border-radius:999px;font-size:9px;font-weight:900;padding:2px 5px}
.goal-actions{display:flex;gap:8px;margin-top:10px}
.goal-ghost-btn{flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.goal-ghost-btn.secondary{color:var(--sub);font-weight:700}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal-center{align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;max-width:480px;margin:0 auto}
.modal-mid{border-radius:16px;max-height:82vh}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h2{font-size:16px;font-weight:800}
.modal-close{background:none;border:none;color:var(--sub);font-size:22px;cursor:pointer;padding:2px 6px;line-height:1}
.modal-close-big{background:var(--surface2);border:none;color:var(--text);font-size:16px;font-weight:700;cursor:pointer;padding:7px 12px;line-height:1;border-radius:8px}
.modal-close-big:hover{background:var(--border)}
.modal-body{overflow-y:auto;flex:1;padding:14px 16px 20px}

/* 카드 추가 모달 탭 */
.modal-tabs{display:flex;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.modal-tab{flex:1;padding:8px;background:none;border:none;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.modal-tab.on{background:var(--surface2);color:var(--text)}

/* 검색 */
.search-box{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;font-family:inherit;margin-bottom:12px}
.add-sticky{position:sticky;top:0;z-index:12;background:var(--surface);padding-top:14px;padding-bottom:2px}
#addModal .modal-body{padding-top:0;overscroll-behavior:contain;min-height:0}
#addModal .modal{overscroll-behavior:contain;height:88vh}
#addModal .modal-tabs{margin-bottom:12px}

/* 카드 상세 패널 (모달 내) */
.card-detail{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid var(--border)}
.detail-top{display:flex;gap:10px;margin-bottom:10px}
.detail-img{width:60px;height:84px;border-radius:6px;overflow:hidden;flex-shrink:0;border:1.5px solid var(--border)}
.detail-img img{width:100%;height:100%;object-fit:cover}
.detail-info h3{font-size:15px;font-weight:800;margin-bottom:4px}
.detail-info p{font-size:11px;color:var(--sub);line-height:1.5}
.detail-builds{margin-bottom:8px}
.build-tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.build-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
.detail-combo-label{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px}
.add-btn{width:100%;padding:12px;background:var(--green);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}

/* 목표덱 선택 모달 */
.build-card{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;border:1.5px solid var(--border);cursor:pointer;transition:.15s}
.build-card:hover{border-color:var(--cc,#555)}
.build-card.selected{border-color:var(--green);background:rgba(39,174,96,.08)}
.build-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.build-card-name{font-size:15px;font-weight:800;color:var(--cc,#e8e6e3)}
.build-card-desc{font-size:12px;color:var(--sub);margin-bottom:8px}
.build-key-cards{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.build-key-cards::-webkit-scrollbar{display:none}
.build-key-card{width:44px;flex-shrink:0}
.select-build-btn{width:100%;padding:11px;background:var(--green);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px}

/* 완성덱 탭 */
.arch-card{border-radius:var(--radius);overflow:hidden;margin-bottom:14px;border:1px solid var(--border);background:var(--surface)}
.arch-card.open{border-color:rgba(255,255,255,.16);background:#11151d;box-shadow:0 0 0 1px rgba(255,255,255,.03) inset}
.arch-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--surface2);border-bottom:1px solid transparent;transition:.15s}
.arch-head.open{border-bottom-color:rgba(255,255,255,.12);background:#171c25}
.arch-head-left h3{font-size:18px;font-weight:850;letter-spacing:-0.02em;line-height:1.2;color:var(--text)}
.arch-head-left p{font-size:12.5px;color:var(--sub);margin-top:4px;line-height:1.55;max-width:56ch}
.arch-body{background:#151821;padding:14px 14px 16px;border-top:1px solid rgba(255,255,255,.06)}
.arch-section-label{font-size:15px;font-weight:800;color:var(--text);margin-bottom:8px;margin-top:14px;letter-spacing:-0.01em}
.arch-section-label:first-child{margin-top:0}
.guide-build-head{background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.012));border:1.5px solid var(--border);border-radius:14px;padding:14px 15px;margin-bottom:12px}
.guide-build-title{font-size:20px;font-weight:850;display:flex;align-items:center;gap:8px;letter-spacing:-0.025em;line-height:1.2}
.guide-build-desc{font-size:13px;color:var(--sub);margin-top:6px;line-height:1.6;max-width:58ch}
.guide-chip-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.guide-chip{padding:6px 10px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid var(--border);background:var(--surface);letter-spacing:-0.01em}
.guide-chip.red,.guide-chip.orange,.guide-chip.blue,.guide-chip.green,.guide-chip.warn{background:rgba(255,255,255,.03);color:var(--text);border-color:rgba(255,255,255,.12)}




.guide-alert{margin:10px 0 8px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:12px;line-height:1.55}
.guide-alert.warn{background:rgba(241,196,15,.08);color:#f7d36b;border-color:rgba(241,196,15,.18)}
.guide-alert.info{background:rgba(52,152,219,.08);color:#9dd6ff;border-color:rgba(52,152,219,.18)}
.guide-alert.good{background:rgba(39,174,96,.08);color:#92e0b0;border-color:rgba(39,174,96,.18)}
.guide-group{border:2.5px solid rgba(255,255,255,.18);border-radius:14px;padding:12px;margin-top:12px;background:rgba(255,255,255,.022)}
.guide-group.core{border-color:#ff4d4f;background:rgba(255,77,79,.14)}
.guide-group.key{border-color:#faad14;background:rgba(250,173,20,.12)}
.guide-group.flex{border-color:#4096ff;background:rgba(64,150,255,.10)}
.ref-mini-desc{font-size:12px;color:var(--sub);margin:-2px 0 10px;line-height:1.55}
.ref-tip-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.ref-tip-item{font-size:12px;color:var(--sub);line-height:1.6;padding-left:2px}
.ref-chip.ghost{border-color:rgba(255,255,255,.16);color:var(--sub)}
.relic-list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.relic-item{font-size:12px;color:var(--sub);padding:6px 10px;background:var(--surface2);border-radius:6px}
.relic-item strong{color:var(--text)}

/* 카드 탭 */
.rarity-section{margin-bottom:14px}
.rarity-label{font-size:14px;font-weight:800;margin-bottom:7px;padding-left:2px}

/* 푸터 */
.footer{text-align:center;padding:16px;font-size:10px;color:var(--dim);border-top:1px solid var(--surface)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">⚔️ 슬더스2 가이드</div>
  <div class="char-row" id="charRow"></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="ct" id="ct"></div>
<div class="footer">제작자: 무적득구 &nbsp;·&nbsp; elithelucky&#64;gmail.com</div>

<!-- 카드 정보 모달 (중앙) -->
<div class="modal-bg modal-center" id="cardInfoModal">
  <div class="modal modal-mid">
    <div class="modal-head">
      <h2 id="cardInfoTitle">카드 정보</h2>
      <button class="modal-close-big" onclick="closeModal('cardInfoModal')">✕</button>
    </div>
    <div class="modal-body" id="cardInfoBody"></div>
  </div>
</div>

<!-- 카드 추가 모달 -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h2>카드 추가하기</h2>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="modal-body" id="addModalBody">
      <div class="add-sticky">
        <div class="modal-tabs">
          <button class="modal-tab on" onclick="switchAddTab('all')">전체 카드</button>
          <button class="modal-tab" onclick="switchAddTab('combo')">콤보</button>
        </div>
        <input class="search-box" id="cardSearch" placeholder="카드 이름 검색..." oninput="renderAddTab()">
      </div>
      <div id="cardDetailPanel"></div>
      <div id="addTabContent"></div>
    </div>
  </div>
</div>

<!-- 목표덱 선택 모달 -->
<div class="modal-bg" id="goalModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h2>목표 덱 선택</h2>
      <button class="modal-close" onclick="closeModal('goalModal')">×</button>
    </div>
    <div class="modal-body" id="goalModalBody"></div>
  </div>
</div>

<!-- 목표덱 상세 모달 -->
<div class="modal-bg modal-center" id="goalDetailModal">
  <div class="modal modal-mid">

const CHAR_CAP = {ironclad:'Ironclad',silent:'Silent',defect:'Defect',necro:'Necro',regent:'Regent'};

const CLASS_FILE_SUFFIX = {
  ironclad: ['Ironclad','ironclad'],
  silent:   ['Silent','silent'],
  defect:   ['Defect','defect'],
  necro:    ['Necrobinder','necrobinder','Necro','necro'],
  regent:   ['Regent','regent'],
};

function cleanCardName(name) {
  return name.replace(/\s+/g,'').replace(/['']/g,'').trim();
}

function getImageCandidates(cardName, charKey) {
  const clean = cleanCardName(cardName);
  const cleanNoSpec = clean.replace(/[!?]/g,'');
  const suffixes = CLASS_FILE_SUFFIX[charKey] || [charKey];
  const candidates = [];
  const isSharedBasic = ['타격','수비'].includes(cardName);

  if (isSharedBasic) {
    for (const suf of suffixes) {
      candidates.push(`${clean}_${suf}.webp`);
      if (cleanNoSpec !== clean) candidates.push(`${cleanNoSpec}_${suf}.webp`);
    }
  }

  candidates.push(`${clean}.webp`);
  if (cleanNoSpec !== clean) candidates.push(`${cleanNoSpec}.webp`);

  if (!isSharedBasic) {
    for (const suf of suffixes) {
      candidates.push(`${clean}_${suf}.webp`);
      if (cleanNoSpec !== clean) candidates.push(`${cleanNoSpec}_${suf}.webp`);
    }
  }

  return [...new Set(candidates)].map(n => BASE + encodeURIComponent(n));
}

function imgUrl(cardName, charKey) {
  return getImageCandidates(cardName, charKey)[0];
}

function handleImgErr(img, cardName, charKey) {
  const candidates = getImageCandidates(cardName, charKey);
  const tried = Number(img.dataset.tried || 0) + 1;
  if (tried < candidates.length) {
    img.dataset.tried = tried;
    img.src = candidates[tried];
    return;
  }
  img.style.display = 'none';
  const sib = img.nextElementSibling;
  if (sib) sib.style.display = 'flex';
}

function getBuildGuide(ar) {
  const manual = (BUILD_GUIDES[S.char] && BUILD_GUIDES[S.char][ar.id]) || null;
  const key = manual?.key || ar.rec.slice(0, Math.min(4, ar.rec.length));
  const flex = manual?.flex || ar.rec.slice(Math.min(4, ar.rec.length));
  const ops = manual?.ops || [
    '드로우/순환 카드 2~3장을 확보하세요.',
    '방어 카드 2~3장을 유지해서 핵심 카드가 잡힐 때까지 버티세요.',
    '타격·수비 같은 시작 카드는 상점·이벤트에서 우선적으로 줄이세요.'
  ];
  return {
    coreLabel: '이 카드가 없으면 빌드 완성 불가',
    keyLabel: '이 카드들이 모이면 빌드가 제대로 굴러가기 시작',
    flexLabel: '없어도 되지만, 있으면 훨씬 편해지는 카드',
    opsLabel: '다음 보상/상점에서 우선해서 챙길 운영 가이드',
    key,
    flex,
    ops,
  };
}

function getBuildProgressMeta(ar, deck, basics) {
  const guide = getBuildGuide(ar);
  const mustHave = ar.must.filter(n => deck.includes(n)).length;
  const keyHave = guide.key.filter(n => deck.includes(n)).length;
  const basicCount = deck.filter(n => basics.includes(n)).length;
  const coreDone = ar.must.length ? mustHave === ar.must.length : false;
  const keyTarget = Math.max(2, Math.min(guide.key.length, 3));
  let stage = '초입';
  let message = '지금은 필수 카드 확보가 가장 중요해요.';
  let tone = 'info';
  if (coreDone && keyHave >= keyTarget) {
    stage = '가동 시작';
    message = '이제 빌드가 실제로 굴러가기 시작해요. 남는 자리는 방어/드로우로 채우세요.';
    tone = 'good';
  } else if (coreDone) {
    stage = '전환 중';
    message = '필수 카드는 모였어요. 이제 핵심 카드와 운영 카드를 보강할 차례예요.';
    tone = 'info';
  }
  if (coreDone && basicCount >= 5) {
    stage = '압축 타이밍';
    message = `이제 타격/수비 같은 기본 카드 ${basicCount}장을 줄일수록 핵심 카드가 더 자주 잡혀요.`;
    tone = 'warn';
  } else if (!coreDone && basicCount >= 7) {
    message = `기본 카드가 ${basicCount}장으로 많지만, 아직은 압축보다 필수 카드 확보가 먼저예요.`;
    tone = 'warn';
  }

  let rewardText = '다음 보상에서는 필수 카드나 핵심 카드가 보이면 가장 먼저 챙기세요.';
  let shopText = '상점에서는 핵심 카드/유물을 먼저 보고, 제거는 여유가 있을 때 하세요.';
  let deckText = `현재 기본 카드가 ${basicCount}장이라 덱 압축 여지가 있어요.`;

  if (coreDone && basicCount >= 5) {
    rewardText = '다음 보상에서는 운영 보조 카드(방어/드로우/순환)를 우선하세요.';
    shopText = '상점에서는 타격/수비 제거 우선순위가 높아요. 핵심 유물이 보이면 예외예요.';
    deckText = `필수 카드가 갖춰졌고 기본 카드가 ${basicCount}장이라, 지금은 압축 효율이 높아요.`;
  } else if (coreDone) {
    rewardText = '다음 보상에서는 핵심 카드와 운영 보조 카드를 같이 보강하세요.';
    shopText = '상점에서는 핵심 유물 > 운영 카드 > 제거 순서로 보면 편해요.';
    deckText = '빌드 뼈대는 잡혔지만 아직 운영 카드가 더 필요해요.';
  } else if (mustHave === 0) {
    rewardText = '다음 보상에서는 이 빌드의 필수 카드가 보이는지부터 확인하세요.';
    shopText = '상점에서는 제거보다 필수 카드/유물 확보를 우선하세요.';
    deckText = '아직 빌드 핵심에 진입하지 못했어요. 기본 카드가 조금 많아도 당장은 버틸 수 있어요.';
  }

  return {guide, mustHave, keyHave, basicCount, coreDone, stage, message, tone, rewardText, shopText, deckText, keyTarget};
}

      <div class="guide-build-desc">${ar.desc}</div>
      <div class="guide-chip-row">

        <span class="guide-chip blue">있으면 좋은 카드 ${guide.flex.length}장</span>
        <span class="guide-chip ghost">권장 덱 ${ar.size}</span>
      </div>
    </div>
  `;
}

function cc() { return CHARS[S.char].color; }
function archs() {
  return {ironclad:IRONCLAD_ARCHS, silent:SILENT_ARCHS, defect:DEFECT_ARCHS, necro:NECRO_ARCHS, regent:REGENT_ARCHS}[S.char] || [];

// 렌더 메인
// ═══════════════════════════════════════════
function render() {
  // CSS 변수 업데이트
  document.documentElement.style.setProperty('--cc', cc());

  // 직업 선택
  document.getElementById('charRow').innerHTML = Object.entries(CHARS).map(([k,v]) =>
    `<button class="char-btn${S.char===k?' on':''}" onclick="changeChar('${k}')">${v.emoji} ${v.name}</button>`
  ).join('');

  // 탭
  const tabs = [{id:'live',label:'🃏 내 덱'},{id:'combo',label:'🗂️ 빌드 모음'},{id:'ref',label:'📋 카드'}];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<button class="tab-btn${S.tab===t.id?' on':''}" onclick="S.tab='${t.id}';render()">${t.label}</button>`
  ).join('');

  // 본문
  const ct = document.getElementById('ct');
  ct.innerHTML = S.tab==='live' ? renderLive() : S.tab==='combo' ? renderCombo() : renderCards();
}

// ═══════════════════════════════════════════
// 실시간 탭
// ═══════════════════════════════════════════
function renderLive() {
  const deck = S.deck;
  const totalCards = deck.length;
  // 직업별 기본 카드 목록
  const basics = BASIC_CARDS[S.char] || ['타격','수비'];
  const startCards = deck.filter(n => basics.includes(n)).length;
  const needCompress = totalCards > 15;

  // 상태 분석
  const archScores = archs().map(ar => {
    const mustHave = ar.must.filter(n => deck.includes(n)).length;
    const recHave = ar.rec.filter(n => deck.includes(n)).length;
    return { ...ar, mustHave, recHave, score: mustHave*25 + recHave*7 };
  }).sort((a,b) => b.score - a.score);
  const topArch = archScores[0];

  // 활성 콤보
  const activeCombos = combos().filter(cb => cb.cards.every(n => deck.includes(n)));
  const nearCombos = combos().filter(cb => !cb.cards.every(n=>deck.includes(n)) && cb.cards.some(n=>deck.includes(n)));

  let h = '';

  // ── 상태 요약 ──
  h += `<div class="section">`;
  h += `<div class="status-row">`;
  h += `<span class="badge info">덱 ${totalCards}장</span>`;
  if (startCards > 0) h += `<span class="badge${startCards>=5?' warn':''}">기본카드 ${startCards}장</span>`;
  if (needCompress) h += `<span class="badge warn">⚠️ 압축 필요</span>`;
  if (topArch && topArch.score > 0) h += `<span class="badge good">${topArch.emoji} ${topArch.name} 방향</span>`;
  h += `</div>`;

  // 방향 분석
  if (deck.length > 2) {
    const top3 = archScores.filter(a => a.score > 0).slice(0,2);
    if (top3.length > 0) {
      top3.forEach((ar, i) => {
        const pct = Math.min(100, ar.score * 1.5);
        h += `<div class="direction-box" style="--cc:${ar.color}">
          <div class="direction-title">${ar.name} ${i===0?'<span style="font-size:12px;font-weight:400;color:var(--sub)">← 유력</span>':''}</div>
          <div class="direction-sub">${ar.desc}</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${ar.color}"></div></div>
        </div>`;
      });
      if (needCompress && startCards >= 3) {
        h += `<div style="font-size:13px;color:var(--yellow);padding:8px 10px;background:rgba(241,196,15,.08);border-radius:6px;margin-top:4px">
          💡 타격·수비 카드가 ${startCards}장 남아있어요. 상점이나 모닥불에서 제거 고려해보세요.
        </div>`;
      }
    } else {
      h += `<div class="hint">카드를 더 추가하면 방향 분석이 시작돼요.</div>`;
    }
  } else {
    h += `<div class="hint">카드를 추가하면 어떤 빌드로 갈 수 있는지 알려드려요.</div>`;
  }
  h += `</div>`;

  // ── 내 덱 ──
  h += `<div class="section">`;
  h += `<div class="sec-title">🃏 내 덱</div>`;
  h += `<div class="card-grid" onclick="cancelRemove()">`;

  // 목표덱과 비교해서 표시
  const goalCards = S.goal ? (archs().find(a=>a.id===S.goal)||{must:[],rec:[]}) : null;
  const goalSet = goalCards ? new Set([...goalCards.must, ...goalCards.rec]) : null;

  deck.forEach((cardName, idx) => {
    const tag = buildTags()[cardName];
    h += cardTileHtml(cardName, idx, false, tag);
  });

  // + 추가 버튼
  h += `<div class="add-tile" onclick="openAddModal()">
    <div class="plus">+</div>
    <div class="add-txt">카드<br>추가하기</div>
  </div>`;
  h += `</div>`;

  // 활성 콤보 (덱 아래)
  if (activeCombos.length > 0) {
    h += `<div style="margin-top:12px"><div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">✅ 완성된 콤보</div>`;
    activeCombos.forEach(cb => {
      const gc = cb.cards.length === 2 ? 'combo-cards-2' : cb.cards.length === 3 ? 'combo-cards-3' : 'combo-cards-n';
      h += `<div class="combo-box">
        <div class="combo-title">${cb.name}</div>
        <div class="combo-desc">${cb.desc}</div>
        <div class="${gc}">${cb.cards.map(n => `<div onclick="showCardInfo('${n}')">${miniCard(n)}</div>`).join('')}</div>
      </div>`;
    });
    h += `</div>`;
  }

  // 근접 콤보 힌트
  if (nearCombos.length > 0) {
    const nc = nearCombos[0];
    const missing = nc.cards.filter(n => !deck.includes(n));
    h += `<div style="margin-top:8px;font-size:13px;color:var(--yellow);padding:8px 10px;background:rgba(241,196,15,.07);border-radius:8px">
      💡 <strong>${missing.join(', ')}</strong> 추가하면 <strong>${nc.name}</strong> 콤보 완성
    </div>`;
  }

  // 목표덱 영역
  if (S.goal) {
    const g = archs().find(a => a.id === S.goal);
    if (g) {
      const guide = getBuildGuide(g);
      const mustHave = g.must.filter(n => deck.includes(n)).length;
      const keyHave = guide.key.filter(n => deck.includes(n)).length;
      const blueprint = [...g.must.map(n => ({name:n, role:'must'})), ...guide.key.map(n => ({name:n, role:'key'}))];
      h += `<div class="goal-minimal">
        <div class="goal-topline">
          <div class="goal-meta">
            <div class="goal-caption">목표 덱</div>
            <div class="goal-name" style="font-size:16px;color:var(--text)">${g.name}</div>
            <div class="goal-subcopy">선명한 카드는 이미 가진 카드, 희미한 카드는 앞으로 맞춰갈 카드예요.</div>
          </div>
          <button class="goal-clear" onclick="S.goal=null;render()">해제</button>
        </div>
        <div class="goal-chip-row">
          <span class="goal-chip red">필수 ${mustHave}/${g.must.length}</span>
          <span class="goal-chip orange">핵심 ${keyHave}/${guide.key.length}</span>
          <span class="goal-chip ghost">권장 덱 ${g.size}</span>
        </div>
        <div class="goal-legend">목표 청사진</div>
        <div class="goal-blueprint-grid">
          ${blueprint.map(item => goalBlueprintCardHtml(item.name, item.role)).join('')}
        </div>
        <div class="goal-actions">
          <button class="goal-ghost-btn" onclick="openGoalDetail()">빌드 상세 보기</button>
          <button class="goal-ghost-btn secondary" onclick="openGoalModal()">목표 덱 바꾸기</button>
        </div>
      </div>`;
    }
  } else {
    h += `<button class="goal-toggle" onclick="openGoalModal()">🎯 목표 덱 설정하기</button>`;
  }

  h += `</div>`;
  return h;
}

// 빌드 모음 탭용 카드 (원본 이미지 그대로, 클릭 시 상세보기)
function archCardHtml(cardName, owned) {
  const src = imgUrl(cardName, S.char);
  return `<div class="card-tile" style="cursor:pointer" onclick="event.stopPropagation();showCardInfo('${cardName}')">
    <img src="${src}" loading="lazy" onerror="handleImgErr(this,'${cardName}','${S.char}')">
    <div class="no-img" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--sub)">${cardName.slice(0,2)}</div>
    <div class="card-name">${cardName}</div>
    ${owned ? `<div style="position:absolute;top:4px;left:4px;background:#27ae60;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px">보유</div>` : ''}
  </div>`;
}

// 카드 타일 HTML
function cardTileHtml(cardName, idx, isMissing=false, _unused=null, isRec=false) {
  const src = imgUrl(cardName, S.char);
  const isRemove = S.removeIdx === idx && idx >= 0;
  let classes = 'card-tile';
  if (isMissing) classes += ' missing';
  if (isRemove) classes += ' show-remove';

  let tagHtml = '';
  const _bt = buildTags();
  const _bc = buildColors();
  const tag = _bt[cardName];
  if (tag) {
    const bc = _bc[tag.build] || '#888';
    tagHtml = `<div class="build-dot" style="background:${bc}22;color:${bc}">${tag.role}</div>`;
  }
  if (isRec) {
    tagHtml = `<div class="build-dot" style="background:rgba(255,255,255,.1);color:#8a8d98">추천</div>`;
  }

  return `<div class="${classes}" onclick="${idx >= 0 ? `event.stopPropagation();toggleRemove(${idx})` : isMissing ? `goalCardClick('${cardName}')` : 'void(0)'}">
    <img src="${src}" loading="lazy" onerror="handleImgErr(this,'${cardName}','${S.char}')">
    <div class="no-img" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--sub)">${cardName.slice(0,2)}</div>
    ${tagHtml}
    <div class="card-name">${cardName}</div>
    <div class="card-overlay" onclick="event.stopPropagation()">
      <button class="ov-btn ov-info" onclick="showCardInfo('${cardName}');cancelRemove()">📋 상세보기</button>
      <button class="ov-btn ov-del" onclick="confirmRemove(${idx})">🗑️ 제거</button>
      <div class="ov-cancel" onclick="cancelRemove()">✕ 닫기</div>
    </div>
  </div>`;
}

// 미니 카드 (콤보/목표덱용 - missing 없이 원본 그대로)
function miniCard(cardName) {
  const src = imgUrl(cardName, S.char);
  return `<div class="card-tile" style="width:100%">
    <img src="${src}" loading="lazy" onerror="handleImgErr(this,'${cardName}','${S.char}')">
    <div class="no-img" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--sub)">${cardName.slice(0,2)}</div>
    <div class="card-name">${cardName}</div>
  </div>`;
}


function handleArchBodyClick(event) {
  if (event.target.closest('.card-tile, .relic-item, .goal-ghost-btn, button, img, .modal-close, .build-tag')) return;
  S.openArchId = null;
  render();
}

function toggleRemove(idx) {
  if (S.removeIdx === idx) {
    // 두번째 탭 = 제거 실행
    S.deck.splice(idx, 1);
    S.removeIdx = null;
    render();
  } else {
    // 첫번째 탭 = 제거 확인 오버레이
    S.removeIdx = idx;
    render();
  }
}

  const src = imgUrl(cardName, S.char);
  const relatedCombos = combos().filter(cb => cb.cards.includes(cardName));

        <img src="${src}" style="width:100%;height:100%;object-fit:cover" onerror="handleImgErr(this,'${cardName}','${S.char}')">
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:18px;font-weight:800;margin-bottom:8px">${cardName}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
          <span style="background:${tc};color:#fff;font-size:12px;font-weight:800;padding:4px 10px;border-radius:6px">${tierLabels[card.tier]||card.tier}</span>
          <span style="background:var(--surface2);color:var(--sub);font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px">${card.t}</span>
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:8px 10px;margin-bottom:8px">
          <div style="font-size:11px;font-weight:700;color:var(--dim);margin-bottom:3px">코스트</div>
          <div style="font-size:14px;font-weight:800;color:var(--text)">${costLabel}</div>
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:8px 10px">
          <div style="font-size:11px;font-weight:700;color:var(--dim);margin-bottom:3px">효과</div>
          <div style="font-size:13px;color:var(--text);line-height:1.7">${effectText}</div>
        </div>
      </div>
    </div>
    <div style="background:rgba(241,196,15,.08);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--yellow);line-height:1.6">
      💡 ${tipText}
    </div>
    ${relatedArchs.length > 0 ? `
    <div style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--sub);margin-bottom:6px">연결되는 빌드</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${relatedArchs.map(ar=>`<span style="background:${ar.color}22;color:${ar.color};font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px">${ar.name}${ar.must.includes(cardName)?' (핵심)':''}</span>`).join('')}
      </div>
    </div>` : ''}
    ${relatedCombos.length > 0 ? `
    <div style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--sub);margin-bottom:8px">함께하면 좋은 카드</div>
      ${relatedCombos.map(cb => {
        const gc = cb.cards.length === 2 ? 'combo-cards-2' : 'combo-cards-3';

          <div class="${gc}">${cb.cards.map(n=>miniCard(n)).join('')}</div>

    ${!inDeck ? `<button onclick="addCardByName('${cardName}');closeModal('cardInfoModal')" style="width:100%;padding:13px;background:var(--green);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">+ 내 덱에 추가하기</button>` : `<div style="text-align:center;padding:10px;font-size:13px;color:var(--green);font-weight:700">✅ 이미 내 덱에 있어요</div>`}
  `;
  document.getElementById('cardInfoModal').classList.add('open');
}

function removeCard(idx) {
  S.deck.splice(idx, 1);
  S.removeIdx = null;
  render();
}

function confirmRemove(idx) {
  const name = S.deck[idx];
  if (confirm(`'${name}'을 덱에서 제거할까요?`)) {
    S.deck.splice(idx, 1);
    S.removeIdx = null;
    render();
  }
}

function cancelRemove() {
  if (S.removeIdx !== null) { S.removeIdx = null; render(); }
}

function addCardByName(name) {
  if (!S.deck.includes(name)) {
    S.deck.push(name);
    showToast(`${name} 추가됨`);
  }
  render();
}

function goalBlueprintCardHtml(cardName, role) {
  const owned = S.deck.includes(cardName);
  const src = imgUrl(cardName, S.char);
  const roleLabel = role === 'must' ? '필수' : '핵심';
  const roleClass = role === 'must' ? 'must' : 'key';
  return `<div class="goal-card ${owned?'owned':'pending'}" onclick="event.stopPropagation();showCardInfo('${cardName}')">
    <img src="${src}" loading="lazy" onerror="handleImgErr(this,'${cardName}','${S.char}')">
    <div class="no-img" style="display:none">?</div>
    <div class="goal-badge ${roleClass}">${roleLabel}</div>
    ${owned ? '<div class="goal-check">보유</div>' : ''}
    <div class="card-name">${cardName}</div>
  </div>`;
}

    ${buildReferenceHeader(ar)}

    <div class="ref-tip-list">${guide.ops.map(c=>`<div class="ref-tip-item">· ${c}</div>`).join('')}</div>

    <div class="relic-list">${ar.relics.map(r=>{

function goalCardClick(name) {
  if (S.deck.includes(name)) {
    showToast(`${name}은 이미 내 덱에 있어요`);
    return;
  }
  if (confirm(`'${name}'을 내 덱에 추가할까요?`)) {
    S.deck.push(name);
    render();
  }
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;pointer-events:none;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.opacity = '0'; }, 1800);
}

async function openAddModal() {
  S.selectedCard = null;
  S.addTab = 'all';
  document.getElementById('cardSearch').value = '';
  await enrichCardsFromRepo(true);
  renderAddTab();
  document.getElementById('addModal').classList.add('open');
  const body = document.getElementById('addModalBody') || document.querySelector('#addModal .modal-body');
  if (body) body.scrollTop = 0;
}

function switchAddTab(tab) {
  S.addTab = tab;
  S.selectedCard = null;
  document.querySelectorAll('.modal-tab').forEach((btn, i) => {
    btn.classList.toggle('on', ['all','combo'][i] === tab);
  });
  renderAddTab();
}

          <div class="detail-info">

            <p style="color:var(--sub);font-size:12px">${card.d}</p>
            <p style="margin-top:4px;font-size:12px;font-style:italic;color:var(--yellow)">💡 ${card.tip}</p>
          </div>
        </div>
        ${relatedArchs.length > 0 ? `
          <div class="detail-builds">
            <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:4px">연결되는 빌드</div>
            <div class="build-tag-row">
              ${relatedArchs.map(ar => `<span class="build-tag" style="background:${ar.color}22;color:${ar.color};font-size:11px">${ar.name}${ar.must.includes(card.n)?' (핵심)':''}</span>`).join('')}
            </div>
          </div>` : ''}
        ${relatedCombos.length > 0 ? `
          <div class="detail-combo-label">함께하면 좋은 카드</div>
          <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">
            ${relatedCombos.flatMap(cb => cb.cards.filter(n=>n!==card.n)).map(n => `<div style="width:52px;flex-shrink:0">${miniCard(n)}</div>`).join('')}
          </div>` : ''}
        <button class="add-btn" style="margin-top:10px" onclick="confirmAdd('${card.n}')">덱에 추가하기</button>
      </div>`;
      return;
    }
  }
  panel.innerHTML = '';

  // 탭별 콘텐츠
  if (S.addTab === 'combo') {
    content.innerHTML = combos().map(cb => {
      const ownedCnt = cb.cards.filter(n => S.deck.includes(n)).length;
      const gc = cb.cards.length === 2 ? 'combo-cards-2' : cb.cards.length === 3 ? 'combo-cards-3' : 'combo-cards-n';
      return `<div class="combo-box">
        <div class="combo-title">${cb.name} <span style="font-size:12px;color:var(--sub)">${ownedCnt}/${cb.cards.length}장 보유</span></div>
        <div class="combo-desc">${cb.desc}</div>
        <div class="${gc}">${cb.cards.map(n => `<div onclick="selectCard('${n}')">${miniCard(n)}</div>`).join('')}</div>
      </div>`;
    }).join('');
    return;
  }

  let list = [...cards()];
  if (q) list = list.filter(c => c.n.replace(/\s/g,'').toLowerCase().includes(q));

  if (list.length === 0) {
    content.innerHTML = `<div class="section" style="text-align:center;padding:28px 12px;color:var(--sub);font-size:13px">검색된 결과가 없어요.</div>`;
    if (body && !S.selectedCard) body.scrollTop = prevScrollTop;
    return;
  }

  content.innerHTML = `<div class="card-grid">
    ${list.map(c => {
      const tag = buildTags()[c.n];
      return `<div onclick="selectCard('${c.n}')">${cardTileHtml(c.n, -1, false, tag)}</div>`;
    }).join('')}
  </div>`;
  if (body && !S.selectedCard) body.scrollTop = prevScrollTop;
}

// ── 1. GNB 드래그 스크롤 ──
(function() {
  const el = document.getElementById('charRow');
  let isDown = false, startX = 0, scrollLeft = 0, moved = false;

  const stopDrag = () => {
    isDown = false;
    el.style.cursor = 'grab';
    el.classList.remove('dragging');
  };

  el.addEventListener('mousedown', e => {
    isDown = true;
    moved = false;
    startX = e.clientX;
    scrollLeft = el.scrollLeft;
  });

  window.addEventListener('mousemove', e => {
    if (!isDown) return;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 6) {
      moved = true;
      el.style.cursor = 'grabbing';
      el.classList.add('dragging');
      el.scrollLeft = scrollLeft - dx;
      e.preventDefault();
    }
  });

  window.addEventListener('mouseup', stopDrag);
  el.addEventListener('mouseleave', stopDrag);

  el.addEventListener('click', e => {
    if (!moved) return;
    e.preventDefault();
    e.stopPropagation();
    moved = false;
  }, true);
})();

function parseRepoFile(filename) {
  const base = filename.replace(/\.webp$/i, '');
  const sharedMatch = base.match(/^(.+?)_(Ironclad|ironclad|Silent|silent|Defect|defect|Necrobinder|necrobinder|Regent|regent)$/);
  if (sharedMatch) return { name: sharedMatch[1], isShared: true, suffix: sharedMatch[2] };
  return { name: base, isShared: false, suffix: null };
}

const CHAR_CARD_ARRAYS = {
  ironclad: IRONCLAD_CARDS,
  silent: SILENT_CARDS,
  defect: DEFECT_CARDS,
  necro: NECRO_CARDS,
  regent: REGENT_CARDS,
};

const REPO_ENRICHED = { ironclad:false, silent:false, defect:false, necro:false, regent:false };
const MANUAL_CLASS_OVERRIDES = { necro: ['쇠락','추출','분리','부름'] };
let REPO_FILES_CACHE = null;
let REPO_MANIFEST_CACHE = null;
let RELIC_IMAGE_FILES = [];

function normalizeRepoName(name) {
  return String(name || '').replace(/\.webp$/i,'').replace(/[_\s]/g,'').replace(/[!?]/g,'').trim();
}

function suffixToCharKey(suffix) {
  return {
    'Ironclad':'ironclad','ironclad':'ironclad',
    'Silent':'silent','silent':'silent',
    'Defect':'defect','defect':'defect',
    'Necrobinder':'necro','necrobinder':'necro','Necro':'necro','necro':'necro',
    'Regent':'regent','regent':'regent',
  }[suffix] || null;
}

function pushCardIfMissing(charKey, cardName) {
  if (!charKey || !cardName) return false;
  const arr = CHAR_CARD_ARRAYS[charKey];
  const normalized = normalizeRepoName(cardName);
  if (!normalized || KNOWN_RELICS.has(normalized)) return false;
  if (arr.some(c => normalizeRepoName(c.n) === normalized)) return false;
  arr.push({n:cardName, c:'?', t:'카드', r:'일반', d:'', tier:'B', tip:''});
  return true;
}

async function loadRepoManifest() {
  if (REPO_MANIFEST_CACHE !== null) return REPO_MANIFEST_CACHE;
  const candidates = ['cards-manifest.json','manifest.json','data/cards-manifest.json','cards_manifest.json'];
  for (const path of candidates) {
    try {
      const res = await fetch(REPO_RAW_BASE + path + '?v=' + Date.now(), { cache:'no-store' });
      if (!res.ok) continue;
      const json = await res.json();
      if (json && typeof json === 'object') {
        REPO_MANIFEST_CACHE = json;
        return json;
      }
    } catch (e) {}
  }
  REPO_MANIFEST_CACHE = false;
  return false;
}

async function loadRepoFiles() {
  if (REPO_FILES_CACHE) return REPO_FILES_CACHE;
  try {
    const treeRes = await fetch(REPO_TREE_API + '&v=' + Date.now(), { cache:'no-store' });
    if (treeRes.ok) {
      const treeJson = await treeRes.json();
      const files = (treeJson.tree || [])
        .filter(f => f.type === 'blob' && /\.webp$/i.test(f.path))
        .map(f => f.path.split('/').pop());
      REPO_FILES_CACHE = [...new Set(files)];
      return REPO_FILES_CACHE;
    }
  } catch (e) {}

  try {
    const res = await fetch(REPO_API + '?v=' + Date.now(), { cache:'no-store' });
    if (!res.ok) return null;
    const files = await res.json();
    REPO_FILES_CACHE = files.filter(f => /\.webp$/i.test(f.name)).map(f => f.name);
    return REPO_FILES_CACHE;
  } catch (e) {
    return null;
  }
}

function updateRelicImages(files) {
  RELIC_IMAGE_FILES = files.filter(f => KNOWN_RELICS.has(normalizeRepoName(f)));
}

function relicImgUrl(relicName) {
  const clean = relicName.replace(/\s/g,'');
  return BASE + encodeURIComponent(clean) + '.webp';
}

function applyManualOverrides() {
  Object.entries(MANUAL_CLASS_OVERRIDES).forEach(([charKey, names]) => {
    names.forEach(name => pushCardIfMissing(charKey, name));
  });
}

function applyManifestCards(manifest) {
  const keyMap = { ironclad:'ironclad', silent:'silent', defect:'defect', necro:'necro', necrobinder:'necro', regent:'regent' };
  Object.entries(keyMap).forEach(([manifestKey, charKey]) => {
    const list = manifest[manifestKey];
    if (!Array.isArray(list)) return;
    list.forEach(name => pushCardIfMissing(charKey, name));
    REPO_ENRICHED[charKey] = true;
  });
}

function applyRepoFilesFallback(files) {
  const existingByChar = Object.fromEntries(
    Object.entries(CHAR_CARD_ARRAYS).map(([charKey, arr]) => [charKey, new Set(arr.map(c => normalizeRepoName(c.n)))])
  );
  const suffixedCountByChar = { ironclad:0, silent:0, defect:0, necro:0, regent:0 };

  files.forEach(file => {
    const parsed = parseRepoFile(file);
    const normalized = normalizeRepoName(parsed.name);
    if (!normalized || KNOWN_RELICS.has(normalized)) return;

    // 파일명에 클래스 suffix가 있으면 그 클래스로 강제 귀속
    if (parsed.suffix) {
      const charKey = suffixToCharKey(parsed.suffix);
      if (charKey) {
        pushCardIfMissing(charKey, parsed.name);
        existingByChar[charKey].add(normalized);
        suffixedCountByChar[charKey] = (suffixedCountByChar[charKey] || 0) + 1;
      }
      return;
    }

    // suffix 없는 카드는 기존 데이터에서 같은 이름을 가진 직업에만 보강
    const matchedChars = Object.keys(existingByChar).filter(charKey => existingByChar[charKey].has(normalized));
    if (matchedChars.length) {
      matchedChars.forEach(charKey => {
        pushCardIfMissing(charKey, parsed.name);
        existingByChar[charKey].add(normalized);
      });
    }
  });

  applyManualOverrides();

  // 디버그/확인용: suffix 기반으로 자동 보강된 개수 기록
  window.__repoCardCounts = Object.fromEntries(
    Object.entries(CHAR_CARD_ARRAYS).map(([charKey, arr]) => [charKey, arr.length])
  );
  window.__repoSuffixedCounts = suffixedCountByChar;
}

async function enrichCardsFromRepo(force=false) {
  if (!force && Object.values(REPO_ENRICHED).every(Boolean)) return;

  const [manifest, files] = await Promise.all([loadRepoManifest(), loadRepoFiles()]);
  if (files) updateRelicImages(files);

  if (manifest) {
    applyManifestCards(manifest);
    Object.keys(REPO_ENRICHED).forEach(k => REPO_ENRICHED[k] = true);
    return;
  }

  if (!files) return;
  applyRepoFilesFallback(files);
  Object.keys(REPO_ENRICHED).forEach(k => REPO_ENRICHED[k] = true);
}

// 최초 렌더 후 레포에서 카드 보강
render();
enrichCardsFromRepo(true).then(() => render());

// 직업 전환시도 레포 보강
async function changeChar(k) {
  S.char = k;
  S.deck = [...(START_DECKS[k] || START_DECKS.ironclad)];
  S.goal = null;
  S.removeIdx = null;
  render();
  await enrichCardsFromRepo();
  render();
}

</script>
