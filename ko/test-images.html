<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>이미지 로드 테스트</title>
<style>
body { padding: 20px; font-family: monospace; }
.test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
.success { background: #d4edda; }
.fail { background: #f8d7da; }
img { max-width: 100px; height: auto; }
</style>
</head>
<body>
<h1>이미지 로드 테스트</h1>

<script src="../js/11-manifest.js"></script>
<script>
console.log('MANIFEST loaded:', typeof MANIFEST !== 'undefined');
console.log('MANIFEST count:', MANIFEST ? MANIFEST.length : 0);

// 테스트할 카드들
const testCards = [
  {name: '연금', char: 'colorless'},
  {name: '임명', char: 'colorless'},
  {name: '불굴', char: 'ironclad'},
  {name: '덤벼라!', char: 'ironclad'},
  {name: '불쾌', char: 'silent'},
  {name: '찢기', char: 'defect'}
];

// MANIFEST 매핑 함수
let _CARD_IMAGE_MAP = null;
function _buildCardImageMap(){
  _CARD_IMAGE_MAP = {};
  if(typeof MANIFEST === 'undefined') return;
  MANIFEST.forEach(function(c){
    if(!c.is_upgrade){
      const key = c.name_ko + '__' + c.char;
      _CARD_IMAGE_MAP[key] = c.final_filename.replace(/\.png$/, '.webp');
      if(!_CARD_IMAGE_MAP[c.name_ko]) {
        _CARD_IMAGE_MAP[c.name_ko] = c.final_filename.replace(/\.png$/, '.webp');
      }
    }
  });
}

function findManifestByName(name, charKey) {
  if(!_CARD_IMAGE_MAP) _buildCardImageMap();
  const key = name + '__' + charKey;
  const filename = _CARD_IMAGE_MAP[key] || _CARD_IMAGE_MAP[name];
  if(!filename) return null;

  if(typeof MANIFEST !== 'undefined'){
    const item = MANIFEST.find(m => m.final_filename.replace(/\.png$/, '.webp') === filename);
    if(item) return item;
  }
  return null;
}

_buildCardImageMap();

// 테스트 실행
testCards.forEach(card => {
  const div = document.createElement('div');
  div.className = 'test';

  const manifest = findManifestByName(card.name, card.char);

  if (manifest) {
    const path = `../images/ko/${manifest.folder}/${manifest.final_filename.replace('.png', '.webp')}`;

    div.innerHTML = `
      <strong>${card.name} (${card.char})</strong><br>
      파일: ${manifest.final_filename}<br>
      경로: ${path}<br>
      <img src="${path}" onload="this.parentElement.classList.add('success')" onerror="this.parentElement.classList.add('fail'); this.outerHTML='❌ 로드 실패'">
    `;
  } else {
    div.className = 'test fail';
    div.innerHTML = `
      <strong>${card.name} (${card.char})</strong><br>
      ❌ MANIFEST에 없음
    `;
  }

  document.body.appendChild(div);
});
</script>
</body>
</html>
